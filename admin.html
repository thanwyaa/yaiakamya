<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Admin - يلا كيمياء</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-cairo bg-gradient-to-br from-gray-900 to-purple-950 text-white">

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, addDoc, setDoc, getDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyBOBu3wp3GcA-VjwtqIt1PAYYpo_HXFhtU",
        authDomain: "yalla-kimya.firebaseapp.com",
        databaseURL: "https://yalla-kimya-default-rtdb.firebaseio.com",
        projectId: "yalla-kimya",
        storageBucket: "yalla-kimya.firebasestorage.app",
        messagingSenderId: "1052374689829",
        appId: "1:1052374689829:web:fbb815ab42d753e63377cc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 👇 ضع UID الأدمن الحقيقي هنا 👇
    const ADMIN_UIDS = ["ضع_UID_الأدمن_هنا"];

    let currentUser = null;

    async function checkAdmin(user) {
        if (!user) { window.location.href = 'login.html'; return false; }
        if (!ADMIN_UIDS.includes(user.uid)) {
            document.body.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="text-center p-8"><div class="text-8xl mb-4">⛔</div><h1 class="text-3xl font-bold mb-2">غير مصرح بالدخول</h1><a href="index.html" class="bg-cyan-500 px-6 py-2 rounded-lg mt-4 inline-block">العودة للرئيسية</a></div></div>`;
            return false;
        }
        return true;
    }

    async function loadStats() {
        const usersSnap = await getDocs(collection(db, "users"));
        const lecturesSnap = await getDocs(collection(db, "lectures"));
        let totalViews = 0;
        lecturesSnap.forEach(d => totalViews += d.data().views || 0);
        document.getElementById('totalStudents').innerText = usersSnap.size;
        document.getElementById('totalLectures').innerText = lecturesSnap.size;
        document.getElementById('totalViews').innerText = totalViews.toLocaleString();
        let totalPoints = 0;
        usersSnap.forEach(d => totalPoints += d.data().points || 0);
        document.getElementById('totalPoints').innerText = totalPoints.toLocaleString();
    }

    async function loadUsers() {
        const q = query(collection(db, "users"), orderBy("points", "desc"));
        const snap = await getDocs(q);
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = '';
        snap.forEach(docSnap => {
            const u = docSnap.data();
            tbody.innerHTML += `
                <tr class="border-b border-gray-700 hover:bg-white/5">
                    <td class="p-3">${u.name || '—'}</td><td class="p-3">${u.email}</td><td class="p-3">${u.points || 0}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded-full text-xs ${u.banned ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}">${u.banned ? 'محظور' : 'نشط'}</span></td>
                    <td class="p-3"><button onclick="banUser('${docSnap.id}', ${!u.banned})" class="bg-yellow-600/20 px-3 py-1 rounded text-sm ml-2">${u.banned ? 'الغاء الحظر' : 'حظر'}</button><button onclick="deleteUser('${docSnap.id}')" class="bg-red-600/20 px-3 py-1 rounded text-sm">حذف</button></td>
                </tr>
            `;
        });
    }

    async function loadLectures() {
        const snap = await getDocs(collection(db, "lectures"));
        const tbody = document.getElementById('lecturesTable');
        tbody.innerHTML = '';
        snap.forEach(docSnap => {
            const l = docSnap.data();
            tbody.innerHTML += `
                <tr class="border-b border-gray-700 hover:bg-white/5">
                    <td class="p-3">${l.title || '—'}</td><td class="p-3">${l.views || 0}</td>
                    <td class="p-3">${l.pdfUrl && l.pdfUrl !== '#' ? '✅' : '❌'}</td>
                    <td class="p-3"><button onclick="deleteLecture('${docSnap.id}')" class="bg-red-600/20 px-3 py-1 rounded text-sm">🗑️ حذف</button></td>
                </tr>
            `;
        });
    }

    window.addLecture = async () => {
        const title = document.getElementById('lectureTitle').value;
        const videoUrl = document.getElementById('lectureVideo').value;
        const pdfUrl = document.getElementById('lecturePdf').value;
        if (!title || !videoUrl) { alert('❌ الرجاء إدخال عنوان ورابط الفيديو'); return; }
        await addDoc(collection(db, "lectures"), { title, videoUrl, pdfUrl: pdfUrl || '#', views: 0, createdAt: new Date() });
        document.getElementById('lectureTitle').value = '';
        document.getElementById('lectureVideo').value = '';
        document.getElementById('lecturePdf').value = '';
        await loadLectures(); await loadStats();
        alert('✅ تم إضافة المحاضرة');
    };

    window.banUser = async (uid, ban) => { await updateDoc(doc(db, "users", uid), { banned: ban }); await loadUsers(); };
    window.deleteUser = async (uid) => { if(confirm('⚠️ تأكيد الحذف؟')) { await deleteDoc(doc(db, "users", uid)); await loadUsers(); await loadStats(); } };
    window.deleteLecture = async (id) => { if(confirm('⚠️ تأكيد حذف المحاضرة؟')) { await deleteDoc(doc(db, "lectures", id)); await loadLectures(); await loadStats(); } };
    window.signOutAdmin = async () => { await signOut(auth); window.location.href = 'index.html'; };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        const ok = await checkAdmin(user);
        if (!ok) return;
        document.getElementById('adminName').innerText = user.email;
        await loadStats(); await loadUsers(); await loadLectures();
    });
</script>

<div class="flex">
    <div class="w-64 min-h-screen bg-black/40 backdrop-blur-lg border-l border-white/10 p-6 fixed">
        <div class="text-center mb-8"><img src="https://videotourl.com/images/1778184631873-622d780a-8224-4f6e-bf20-3df78ed623b1.jpg" class="w-16 h-16 rounded-full mx-auto mb-3 border-2 border-cyan-400"><h2 class="text-xl font-bold">لوحة التحكم</h2><p class="text-xs text-gray-400" id="adminName"></p></div>
        <div class="space-y-2"><div class="bg-cyan-500/20 p-3 rounded-lg text-cyan-400 font-bold">📊 Dashboard</div><div class="p-3 text-gray-400 hover:bg-white/10 rounded-lg cursor-pointer" onclick="location.reload()">🔄 تحديث</div><div class="p-3 text-red-400 hover:bg-red-500/10 rounded-lg cursor-pointer" onclick="signOutAdmin()">🚪 خروج</div></div>
    </div>
    
    <div class="flex-1 mr-64 p-8">
        <h1 class="text-3xl font-bold mb-8">✨ لوحة تحكم الأدمن</h1>
        
        <div class="grid grid-cols-4 gap-6 mb-8">
            <div class="bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl p-6 text-center"><div class="text-3xl mb-2">👨‍🎓</div><div class="text-2xl font-bold" id="totalStudents">0</div><div class="text-sm">الطلاب</div></div>
            <div class="bg-gradient-to-r from-blue-600 to-cyan-600 rounded-xl p-6 text-center"><div class="text-3xl mb-2">📚</div><div class="text-2xl font-bold" id="totalLectures">0</div><div class="text-sm">المحاضرات</div></div>
            <div class="bg-gradient-to-r from-green-600 to-emerald-600 rounded-xl p-6 text-center"><div class="text-3xl mb-2">👁️</div><div class="text-2xl font-bold" id="totalViews">0</div><div class="text-sm">المشاهدات</div></div>
            <div class="bg-gradient-to-r from-yellow-600 to-orange-600 rounded-xl p-6 text-center"><div class="text-3xl mb-2">🪙</div><div class="text-2xl font-bold" id="totalPoints">0</div><div class="text-sm">النقاط</div></div>
        </div>
        
        <div class="bg-white/5 rounded-xl p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">➕ إضافة محاضرة</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="lectureTitle" placeholder="عنوان المحاضرة" class="bg-white/10 rounded-lg p-3 border border-white/20 focus:border-cyan-400 outline-none">
                <input type="text" id="lectureVideo" placeholder="رابط الفيديو" class="bg-white/10 rounded-lg p-3 border border-white/20 focus:border-cyan-400 outline-none">
                <input type="text" id="lecturePdf" placeholder="رابط PDF (اختياري)" class="bg-white/10 rounded-lg p-3 border border-white/20 focus:border-cyan-400 outline-none">
            </div>
            <button onclick="addLecture()" class="mt-4 bg-gradient-to-r from-cyan-500 to-blue-500 px-6 py-2 rounded-lg font-bold">✨ إضافة</button>
        </div>
        
        <div class="bg-white/5 rounded-xl p-6 mb-8"><h2 class="text-2xl font-bold mb-4">👨‍🎓 الطلاب</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b border-gray-700"><th class="text-right p-3">الاسم</th><th class="text-right p-3">البريد</th><th class="text-right p-3">النقاط</th><th class="text-right p-3">الحالة</th><th class="text-right p-3">إجراءات</th></tr></thead><tbody id="usersTable"></tbody></table></div></div>
        
        <div class="bg-white/5 rounded-xl p-6"><h2 class="text-2xl font-bold mb-4">📚 المحاضرات</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b border-gray-700"><th class="text-right p-3">العنوان</th><th class="text-right p-3">المشاهدات</th><th class="text-right p-3">PDF</th><th class="text-right p-3">إجراءات</th></tr></thead><tbody id="lecturesTable"></tbody></table></div></div>
    </div>
</div>
</body>
</html>
