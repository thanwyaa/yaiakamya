<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 لوحة الأدمن - يلا كيمياء</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a1a;
            color: white;
            direction: rtl;
        }
        
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
        }
        
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            text-align: center;
        }
        
        .login-box h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .login-box p {
            color: #999;
            margin-bottom: 30px;
        }
        
        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            text-align: center;
        }
        
        .login-box input::placeholder {
            color: #666;
        }
        
        .login-box button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #b366ff, #ff66b2);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
        }
        
        .login-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(179,102,255,0.4);
        }
        
        .error-msg {
            color: #ff4444;
            margin-top: 10px;
            display: none;
        }
        
        /* لوحة الأدمن */
        .admin-panel {
            display: none;
            padding: 30px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
            border-radius: 20px;
        }
        
        .admin-header h1 {
            background: linear-gradient(to right, #b366ff, #ff66b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logout-btn {
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid #ff4444;
            background: transparent;
            color: #ff4444;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            transition: 0.3s;
        }
        
        .logout-btn:hover {
            background: #ff4444;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }
        
        .stat-card h2 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #b366ff, #ff66b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-card p {
            color: #999;
            margin-top: 5px;
        }
        
        .students-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            overflow: hidden;
        }
        
        .students-table th {
            background: rgba(179,102,255,0.2);
            padding: 15px;
            text-align: right;
            font-weight: 700;
        }
        
        .students-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .students-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .block-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        
        .block-btn.block {
            background: #ff4444;
            color: white;
        }
        
        .block-btn.unblock {
            background: #22c55e;
            color: white;
        }
        
        .hidden {
            display: none !important;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #b366ff, #ff66b2);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 999;
            animation: toastAnim 3s ease forwards;
        }
        
        @keyframes toastAnim {
            0% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>👑</h1>
            <h2 style="margin-bottom:5px;">لوحة الأدمن</h2>
            <p>يلا كيمياء - دخول المشرفين</p>
            
            <input type="text" id="adminEmail" placeholder="البريد الإلكتروني للأدمن">
            <input type="password" id="adminPassword" placeholder="كلمة المرور السرية">
            <button onclick="loginAdmin()">🔐 دخول</button>
            <p class="error-msg" id="errorMsg">❌ بيانات غير صحيحة</p>
        </div>
    </div>

    <!-- لوحة الأدمن -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h1>👑 لوحة تحكم الأدمن</h1>
            <div style="display:flex;align-items:center;gap:15px;">
                <span id="adminName" style="color:#b366ff;font-weight:700;"></span>
                <button class="logout-btn" onclick="logoutAdmin()">🚪 خروج</button>
            </div>
        </div>
        
        <!-- الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <h2 id="totalStudents">0</h2>
                <p>👥 إجمالي الطلاب</p>
            </div>
            <div class="stat-card">
                <h2 id="totalCoins">0</h2>
                <p>🧪 إجمالي العملات</p>
            </div>
            <div class="stat-card">
                <h2 id="onlineStudents">0</h2>
                <p>🟢 طلاب أونلاين</p>
            </div>
            <div class="stat-card">
                <h2 id="totalHours">0</h2>
                <p>⏱️ ساعات المشاهدة</p>
            </div>
        </div>
        
        <!-- قائمة الطلاب -->
        <h2 style="margin-bottom:20px;">👥 قائمة الطلاب</h2>
        <table class="students-table">
            <thead>
                <tr>
                    <th>الطالب</th>
                    <th>البريد</th>
                    <th>العملات 🧪</th>
                    <th>آخر نشاط</th>
                    <th>الحالة</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="studentsList"></tbody>
        </table>
    </div>

    <script>
        // ═════════════════════════
        // 🔥 Firebase Config
        // ═════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyBOBu3wp3GcA-VjwtqIt1PAYYpo_HXFhtU",
            authDomain: "yalla-kimya.firebaseapp.com",
            databaseURL: "https://yalla-kimya-default-rtdb.firebaseio.com",
            projectId: "yalla-kimya",
            storageBucket: "yalla-kimya.firebasestorage.app",
            messagingSenderId: "1052374689829",
            appId: "1:1052374689829:web:fbb815ab42d753e63377cc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ═════════════════════════
        // 🔑 كلمات مرور الأدمن
        // ═════════════════════════
        const ADMIN_CREDENTIALS = {
            "ziad@yallakimya.com": "ZiadAdmin@2024#Secure",
            "moderator@yallakimya.com": "Moderator@2024#Safe"
        };

        // ═════════════════════════
        // 🎯 وظائف الأدمن
        // ═════════════════════════
        
        // دخول الأدمن
        function loginAdmin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            
            if (ADMIN_CREDENTIALS[email] === password) {
                // ✅ دخول ناجح
                sessionStorage.setItem('admin_logged', 'true');
                sessionStorage.setItem('admin_email', email);
                
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').style.display = 'block';
                
                document.getElementById('adminName').textContent = email.split('@')[0];
                document.getElementById('errorMsg').style.display = 'none';
                
                loadAdminData();
                showToast('✅ دخول ناجح');
            } else {
                // ❌ بيانات خطأ
                document.getElementById('errorMsg').style.display = 'block';
                
                // تسجيل محاولة فاشلة
                db.ref('security/failed_logins').push({
                    email: email,
                    timestamp: Date.now(),
                    userAgent: navigator.userAgent
                });
            }
        }

        // خروج الأدمن
        function logoutAdmin() {
            sessionStorage.removeItem('admin_logged');
            sessionStorage.removeItem('admin_email');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('adminPanel').style.display = 'none';
        }

        // تحميل بيانات الأدمن
        function loadAdminData() {
            // تحميل الطلاب
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val() || {};
                const studentsList = document.getElementById('studentsList');
                
                let totalStudents = 0;
                let totalCoins = 0;
                let totalHours = 0;
                let onlineStudents = 0;
                
                studentsList.innerHTML = '';
                
                Object.entries(users).forEach(([uid, user]) => {
                    totalStudents++;
                    totalCoins += (user.coins || 0);
                    totalHours += (user.totalWatchTime || 0);
                    
                    // هل متصل الآن؟
                    const isOnline = user.lastActive && (Date.now() - user.lastActive) < 300000;
                    if (isOnline) onlineStudents++;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'طالب') + '&background=b366ff&color=fff'}" 
                                     style="width:40px;height:40px;border-radius:50%;border:2px solid #b366ff;">
                                <div>
                                    <strong>${user.displayName || 'طالب'}</strong>
                                    ${isOnline ? '<span style="color:#22c55e;font-size:0.8rem;">● أونلاين</span>' : ''}
                                </div>
                            </div>
                        </td>
                        <td style="color:#999;">${user.email || '-'}</td>
                        <td><span style="color:#ffd700;font-weight:700;">🧪 ${user.coins || 0}</span></td>
                        <td style="color:#999;">${formatTime(user.lastActive)}</td>
                        <td>
                            <span style="color:${user.isBlocked ? '#ff4444' : '#22c55e'};">
                                ${user.isBlocked ? '🚫 محظور' : '✅ نشط'}
                            </span>
                        </td>
                        <td>
                            <button class="block-btn ${user.isBlocked ? 'unblock' : 'block'}" 
                                    onclick="toggleBlock('${uid}', ${user.isBlocked || false})">
                                ${user.isBlocked ? '✅ فك الحظر' : '🚫 حظر'}
                            </button>
                        </td>
                    `;
                    studentsList.appendChild(row);
                });
                
                // تحديث الإحصائيات
                document.getElementById('totalStudents').textContent = totalStudents;
                document.getElementById('totalCoins').textContent = totalCoins.toLocaleString();
                document.getElementById('onlineStudents').textContent = onlineStudents;
                document.getElementById('totalHours').textContent = Math.round(totalHours);
            });
        }

        // حظر / فك حظر طالب
        function toggleBlock(uid, currentStatus) {
            db.ref(`users/${uid}/isBlocked`).set(!currentStatus)
                .then(() => {
                    showToast(currentStatus ? '✅ تم فك الحظر' : '🚫 تم حظر الطالب');
                });
        }

        // تنسيق الوقت
        function formatTime(timestamp) {
            if (!timestamp) return 'غير معروف';
            const now = Date.now();
            const diff = now - timestamp;
            
            if (diff < 60000) return 'الآن';
            if (diff < 3600000) return `منذ ${Math.floor(diff/60000)} دقيقة`;
            if (diff < 86400000) return `منذ ${Math.floor(diff/3600000)} ساعة`;
            return `منذ ${Math.floor(diff/86400000)} يوم`;
        }

        // إشعار
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ═════════════════════════
        // ✅ التحقق عند تحميل الصفحة
        // ═════════════════════════
        window.onload = function() {
            const isLogged = sessionStorage.getItem('admin_logged');
            
            if (isLogged === 'true') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminName').textContent = 
                    (sessionStorage.getItem('admin_email') || 'Admin').split('@')[0];
                loadAdminData();
            }
        };
    </script>

</body>
</html>
