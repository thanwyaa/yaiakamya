<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>يلا كيمياء | تسجيل الدخول</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Lalezar&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0a0f16;
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 100vh;
    }
    .font-lalezar { font-family: 'Lalezar', cursive; }
    
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
      z-index: 9998; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1.5rem; transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #d62828; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .split-container { display: flex; flex-direction: row-reverse; min-height: 100vh; width: 100%; }
    .image-half { width: 60%; height: 100vh; position: sticky; top: 0; background-color: #000; overflow: hidden; }
    .form-half {
      width: 40%; min-height: 100vh; background: linear-gradient(135deg, #0b1018 0%, #111827 50%, #0d1117 100%);
      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .auth-image {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      filter: brightness(0.85) contrast(1.1);
      transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
      animation: zoomSlow 20s infinite alternate;
    }
    @keyframes zoomSlow { from { transform: scale(1.02); } to { transform: scale(1.08); } }
    
    .glass-card {
      background: rgba(15,23,42,0.75); backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 40px 80px rgba(0,0,0,0.7);
      width: 100%; max-width: 460px; border-radius: 28px; padding: 2.5rem;
    }
    .custom-input {
      transition: all 0.3s ease; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1);
      width: 100%; padding: 14px 16px; border-radius: 12px; color: white; font-size: 0.95rem;
    }
    .custom-input:focus { border-color: #d62828; box-shadow: 0 0 25px rgba(214,40,40,0.2); background: rgba(214,40,40,0.05); outline: none; }
    .custom-input::placeholder { color: rgba(255,255,255,0.3); }
    
    .strength-meter { height: 6px; border-radius: 10px; background: #333; margin-top: 8px; overflow: hidden; }
    .strength-meter-fill { height: 100%; border-radius: 10px; transition: width 0.3s ease, background 0.3s ease; }
    
    .btn-primary { background: linear-gradient(135deg, #ff2e2e 0%, #b91c1c 100%); box-shadow: 0 10px 30px rgba(255,0,0,0.3); transition: all 0.3s ease; color: white; font-weight: 700; padding: 14px 28px; border-radius: 14px; border: none; cursor: pointer; width: 100%; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(255,0,0,0.5); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s ease; padding: 12px 24px; border-radius: 14px; cursor: pointer; width: 100%; font-weight: 600; }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.4); }
    
    .tab-active { background: linear-gradient(135deg, #d62828 0%, #c0392b 100%); box-shadow: 0 8px 25px rgba(214,40,40,0.4); color: white !important; transform: scale(1.05); transition: all 0.3s ease; }
    
    .toast-notification {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
      min-width: 300px; text-align: center; padding: 16px 28px; border-radius: 16px;
      font-weight: 600; font-size: 0.95rem; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      animation: slideDown 0.4s ease-out; pointer-events: none;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    
    .input-error { border-color: #ef4444 !important; }
    
    .form-half::-webkit-scrollbar { width: 5px; }
    .form-half::-webkit-scrollbar-track { background: transparent; }
    .form-half::-webkit-scrollbar-thumb { background: #d62828; border-radius: 10px; }

    @media (max-width: 1024px) { .image-half { width: 50%; } .form-half { width: 50%; } }
    @media (max-width: 768px) {
      .split-container { flex-direction: column; }
      .image-half { width: 100%; height: 40vh; min-height: 300px; position: relative; top: auto; }
      .form-half { width: 100%; height: auto; padding: 1.5rem 1rem; }
      .glass-card { max-width: 100%; padding: 1.8rem; border-radius: 24px; }
      .auth-image { object-position: center 30%; }
    }
    @media (max-width: 480px) { .image-half { height: 35vh; min-height: 250px; } .glass-card { padding: 1.5rem; border-radius: 20px; } }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div><p class="text-white font-bold text-lg">جاري التحميل...</p></div>
  <div id="toastContainer"></div>

  <div class="split-container">
    <div class="image-half">
      <img id="loginImage" src="https://r2.image-upload.app/tyImg/qZhlMXe2.png" alt="تسجيل الدخول" class="auth-image" style="opacity:1" loading="eager">
      <img id="registerImage" src="https://r2.image-upload.app/tyImg/FTtj8a4k.png" alt="إنشاء حساب" class="auth-image" style="opacity:0" loading="lazy">
      <div class="absolute inset-0 bg-gradient-to-l from-black/80 via-black/30 to-transparent pointer-events-none"></div>
    </div>

    <div class="form-half">
      <div class="glass-card">
        <div class="text-center mb-8">
          <img src="https://r2.image-upload.app/tyImg/Tyuyqlcy.jpg" alt="يلا كيمياء" class="w-20 h-20 rounded-2xl object-cover border-2 border-red-500 shadow-lg mx-auto mb-4">
          <h1 class="font-lalezar text-3xl md:text-4xl text-white mb-1">يلا كيمياء</h1>
          <p class="text-gray-400 text-sm">منصة مستر زياد مبروك التعليمية</p>
        </div>

        <div class="flex bg-white/5 rounded-2xl p-1.5 mb-8">
          <button id="loginTabBtn" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 tab-active"><i class="fas fa-sign-in-alt ml-2"></i>تسجيل الدخول</button>
          <button id="registerTabBtn" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 text-gray-400 hover:text-white"><i class="fas fa-user-plus ml-2"></i>إنشاء حساب</button>
        </div>

        <form id="loginForm" class="space-y-5" novalidate>
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2"><i class="fas fa-envelope ml-1 text-red-400"></i>البريد الإلكتروني</label>
            <input type="email" id="loginEmail" autocomplete="email" required class="custom-input" placeholder="example@email.com">
            <p id="loginEmailError" class="text-red-400 text-xs mt-1.5 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2"><i class="fas fa-lock ml-1 text-red-400"></i>كلمة المرور</label>
            <div class="relative">
              <input type="password" id="loginPassword" autocomplete="current-password" required class="custom-input" placeholder="••••••••">
              <button type="button" id="toggleLoginPassword" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition p-2"><i class="far fa-eye"></i></button>
            </div>
            <p id="loginPasswordError" class="text-red-400 text-xs mt-1.5 hidden"></p>
          </div>
          <button type="submit" id="loginSubmitBtn" class="btn-primary"><span>تسجيل الدخول</span><i class="fas fa-arrow-left"></i></button>
          <p id="loginBlockMsg" class="text-yellow-400 text-sm text-center hidden bg-yellow-400/10 py-3 rounded-xl"></p>
        </form>

        <form id="registerForm" class="space-y-4 hidden" novalidate>
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2"><i class="fas fa-user ml-1 text-red-400"></i>الاسم الكامل</label>
            <input type="text" id="regName" autocomplete="name" required class="custom-input" placeholder="أدخل الاسم ثلاثي (عربي)">
            <p id="regNameError" class="text-red-400 text-xs mt-1.5 hidden"></p>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-semibold text-gray-300 mb-2"><i class="fas fa-mobile-alt ml-1 text-red-400"></i>رقم الطالب</label>
              <input type="tel" id="regStudentPhone" autocomplete="tel" required class="custom-input" placeholder="01xxxxxxxxx" maxlength="11">
              <p id="regStudentPhoneError" class="text-red-400 text-xs mt-1.5 hidden"></p>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-300 mb-2"><i class="fas fa-phone ml-1 text-red-400"></i>ولي الأمر</label>
              <input type="tel" id="regParentPhone" autocomplete="tel" required class="custom-input" placeholder="01xxxxxxxxx" maxlength="11">
              <p id="regParentPhoneError" class="text-red-400 text-xs mt-1.5 hidden"></p>
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2"><i class="fas fa-envelope ml-1 text-red-400"></i>البريد الإلكتروني</label>
            <input type="email" id="regEmail" autocomplete="email" required class="custom-input" placeholder="example@email.com">
            <p id="regEmailError" class="text-red-400 text-xs mt-1.5 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-300 mb-2"><i class="fas fa-lock ml-1 text-red-400"></i>كلمة المرور</label>
            <div class="relative">
              <input type="password" id="regPassword" autocomplete="new-password" required class="custom-input" placeholder="Abc@1234">
              <button type="button" id="toggleRegPassword" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition p-2"><i class="far fa-eye"></i></button>
            </div>
            <div class="strength-meter"><div class="strength-meter-fill" id="strengthFill" style="width:0%"></div></div>
            <p id="strengthText" class="text-xs mt-1 text-gray-500"></p>
            <p id="regPasswordError" class="text-red-400 text-xs mt-1.5 hidden"></p>
          </div>
          <button type="submit" id="registerSubmitBtn" class="btn-primary"><span>إنشاء الحساب</span><i class="fas fa-user-plus"></i></button>
        </form>

        <p class="text-center text-gray-500 text-xs mt-8">© 2026 يلا كيمياء | جميع الحقوق محفوظة</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDX-DEv8K5aOyXk12L_3qQNnKGdAui6paE",
      authDomain: "yalla-chemistry-github.firebaseapp.com",
      projectId: "yalla-chemistry-github",
      storageBucket: "yalla-chemistry-github.firebasestorage.app",
      messagingSenderId: "112757887385",
      appId: "1:112757887385:web:eb77f8fd77bf5503fc4308"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = id => document.getElementById(id);
    
    function toast(msg, type = 'info') {
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
      const t = document.createElement('div');
      t.className = `toast-notification ${colors[type]} text-white`;
      t.textContent = msg;
      $('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    function showLoading() { $('loadingOverlay').classList.remove('hidden'); }
    function hideLoading() { $('loadingOverlay').classList.add('hidden'); }

    function sanitize(str) {
      return typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(str, { ALLOWED_TAGS: [], ALLOWED_ATTR: [] }).trim() : str.replace(/[<>"'&]/g, '').trim();
    }

    function toLoginImg() { $('registerImage').style.opacity = '0'; $('loginImage').style.opacity = '1'; }
    function toRegImg() { $('loginImage').style.opacity = '0'; $('registerImage').style.opacity = '1'; }

    function switchTab(tab) {
      if (tab === 'login') {
        $('loginTabBtn').classList.add('tab-active'); $('loginTabBtn').classList.remove('text-gray-400');
        $('registerTabBtn').classList.remove('tab-active'); $('registerTabBtn').classList.add('text-gray-400');
        $('loginForm').classList.remove('hidden'); $('registerForm').classList.add('hidden');
        toLoginImg(); setTimeout(() => $('loginEmail').focus(), 100);
      } else {
        $('registerTabBtn').classList.add('tab-active'); $('registerTabBtn').classList.remove('text-gray-400');
        $('loginTabBtn').classList.remove('tab-active'); $('loginTabBtn').classList.add('text-gray-400');
        $('registerForm').classList.remove('hidden'); $('loginForm').classList.add('hidden');
        toRegImg(); setTimeout(() => $('regName').focus(), 100);
      }
    }

    $('loginTabBtn').addEventListener('click', () => switchTab('login'));
    $('registerTabBtn').addEventListener('click', () => switchTab('register'));

    $('toggleLoginPassword').addEventListener('click', () => {
      const p = $('loginPassword').type === 'password';
      $('loginPassword').type = p ? 'text' : 'password';
      $('toggleLoginPassword').innerHTML = p ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
    });
    $('toggleRegPassword').addEventListener('click', () => {
      const p = $('regPassword').type === 'password';
      $('regPassword').type = p ? 'text' : 'password';
      $('toggleRegPassword').innerHTML = p ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
    });

    const validEmail = e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
    const validPhone = p => /^01[0-9]{9}$/.test(p);
    const isStrongPassword = p => p.length >= 8 && /[a-z]/.test(p) && /[A-Z]/.test(p) && /[0-9]/.test(p) && /[^a-zA-Z0-9]/.test(p);

    $('regPassword').addEventListener('input', () => {
      const pw = $('regPassword').value;
      let entropy = 0;
      if (pw.length > 0) {
        const cs = (/[a-z]/.test(pw)?26:0) + (/[A-Z]/.test(pw)?26:0) + (/[0-9]/.test(pw)?10:0) + (/[^a-zA-Z0-9]/.test(pw)?32:0);
        entropy = pw.length * Math.log2(Math.max(cs, 1));
      }
      const s = Math.min((entropy / 60) * 100, 100);
      $('strengthFill').style.width = s + '%';
      if (s < 25) { $('strengthFill').style.background = '#ef4444'; $('strengthText').textContent = 'ضعيفة'; }
      else if (s < 50) { $('strengthFill').style.background = '#f59e0b'; $('strengthText').textContent = 'متوسطة'; }
      else if (s < 75) { $('strengthFill').style.background = '#3b82f6'; $('strengthText').textContent = 'قوية'; }
      else { $('strengthFill').style.background = '#10b981'; $('strengthText').textContent = 'قوية جداً'; }
    });

    onAuthStateChanged(auth, async user => {
      hideLoading();
      if (user) {
        if (!user.emailVerified) { toast('⚠️ فعل بريدك أولاً', 'warning'); await signOut(auth); return; }
        showLoading(); setTimeout(() => location.href = 'student.html', 500);
      }
    });

    $('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const em = sanitize($('loginEmail').value), pw = $('loginPassword').value;
      if (!em || !validEmail(em)) { $('loginEmailError').textContent = 'بريد غير صالح'; $('loginEmailError').classList.remove('hidden'); return; }
      if (!pw || pw.length < 6) { $('loginPasswordError').textContent = '6 أحرف'; $('loginPasswordError').classList.remove('hidden'); return; }
      $('loginSubmitBtn').disabled = true;
      try { await signInWithEmailAndPassword(auth, em, pw); toast('✅ أهلاً بك', 'success'); }
      catch { toast('❌ خطأ في البيانات', 'error'); }
      finally { $('loginSubmitBtn').disabled = false; }
    });

    $('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const nm = sanitize($('regName').value), sp = sanitize($('regStudentPhone').value), pp = sanitize($('regParentPhone').value), em = sanitize($('regEmail').value), pw = $('regPassword').value;
      if (!nm || nm.split(' ').length < 3) { $('regNameError').textContent = 'اسم ثلاثي'; $('regNameError').classList.remove('hidden'); return; }
      if (!sp || !validPhone(sp)) { $('regStudentPhoneError').textContent = '11 رقم'; $('regStudentPhoneError').classList.remove('hidden'); return; }
      if (!pp || !validPhone(pp)) { $('regParentPhoneError').textContent = '11 رقم'; $('regParentPhoneError').classList.remove('hidden'); return; }
      if (sp === pp) { toast('❌ رقمان مختلفان', 'error'); return; }
      if (!em || !validEmail(em)) { $('regEmailError').textContent = 'بريد غير صالح'; $('regEmailError').classList.remove('hidden'); return; }
      if (!pw || !isStrongPassword(pw)) { $('regPasswordError').textContent = '8+ أحرف،كبير،رقم،رمز'; $('regPasswordError').classList.remove('hidden'); return; }
      $('registerSubmitBtn').disabled = true;
      try {
        const q = query(collection(db, 'users'), where('studentPhone', '==', sp));
        if (!(await getDocs(q)).empty) { toast('⚠️ رقم الطالب مسجل', 'error'); $('registerSubmitBtn').disabled = false; return; }
        const c = await createUserWithEmailAndPassword(auth, em, pw);
        await setDoc(doc(db, 'users', c.user.uid), { name: nm, studentPhone: sp, parentPhone: pp, email: em, points: 0, level: 1, createdAt: new Date().toISOString() });
        await sendEmailVerification(c.user);
        await signOut(auth);
        toast('📧 تم التسجيل. فعل بريدك.', 'success');
        switchTab('login');
        $('loginEmail').value = em;
      } catch (err) { toast(err.code === 'auth/email-already-in-use' ? '⚠️ البريد مستخدم' : '❌ خطأ', 'error'); }
      finally { $('registerSubmitBtn').disabled = false; }
    });

    hideLoading();
    $('loginEmail').focus();
    console.log('✅ Login Ready');
  </script>
</body>
</html>
