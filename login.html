  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0a0f16;
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 100vh;
    }
    .font-lalezar { font-family: 'Lalezar', cursive; }
    
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
      z-index: 9998; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1.5rem; transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {

    .form-half {

      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .auth-image {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;

      filter: brightness(0.85) contrast(1.1);
      transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);

    }
    @keyframes zoomSlow { from { transform: scale(1.02); } to { transform: scale(1.08); } }
    
    .glass-card {

    .strength-meter { height: 6px; border-radius: 10px; background: #333; margin-top: 8px; overflow: hidden; }
    .strength-meter-fill { height: 100%; border-radius: 10px; transition: width 0.3s ease, background 0.3s ease; }
    
    .btn-primary { background: linear-gradient(135deg, #ff2e2e 0%, #b91c1c 100%); box-shadow: 0 10px 30px rgba(255,0,0,0.3); transition: all 0.3s ease; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(255,0,0,0.5); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s ease; }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.4); }
    
    .tab-active { background: linear-gradient(135deg, #d62828 0%, #c0392b 100%); box-shadow: 0 8px 25px rgba(214,40,40,0.4); color: white !important; transform: scale(1.05); transition: all 0.3s ease; }
    
    .toast-notification {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
      min-width: 300px; text-align: center; padding: 16px 28px; border-radius: 16px;
      font-weight: 600; font-size: 0.95rem; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      animation: slideDown 0.4s ease-out; pointer-events: none;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    
    .input-error { border-color: #ef4444 !important; }
    
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
      z-index: 9997; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }
    
    .form-half::-webkit-scrollbar { width: 5px; }
    .form-half::-webkit-scrollbar-track { background: transparent; }
    .form-half::-webkit-scrollbar-thumb { background: #d62828; border-radius: 10px; }

    @media (max-width: 1024px) { .image-half { width: 50%; } .form-half { width: 50%; } }
    @media (max-width: 768px) {
      .split-container { flex-direction: column; }
      .image-half { width: 100%; height: 40vh; min-height: 300px; position: relative; top: auto; }

    }
    @media (max-width: 480px) { .image-half { height: 35vh; min-height: 250px; } .glass-card { padding: 1.5rem; border-radius: 20px; } }

  <!-- 
    ============================================
    SECURITY ARCHITECTURE NOTE
    ============================================
    This file contains ALL security layers.
    For production, split into:
    - /js/auth.js      (Firebase logic)
    - /js/validate.js  (validation + sanitize)
    - /js/security.js  (rate limit + abuse)
    - /js/ui.js        (toast + loading)
    
    SERVER-SIDE REQUIRED (Cloud Functions):
    - Rate limiting by IP
    - Block email writing (client only reads)
    - Email verification API
    ============================================
  -->
  
  <script type="module">
    // ============================================
    // SECURITY MODULE: Rate Limiting + Sanitize
    // ============================================
    const Security = {
      rateLimitStore: {},
      checkRateLimit(action, max = 1, windowMs = 120000) {
        const now = Date.now(), key = `rl_${action}`;
        if (!this.rateLimitStore[key]) {
          try { this.rateLimitStore[key] = JSON.parse(localStorage.getItem(key) || '[]'); } 
          catch { this.rateLimitStore[key] = []; }
        }
        this.rateLimitStore[key] = this.rateLimitStore[key].filter(t => now - t < windowMs);
        if (this.rateLimitStore[key].length >= max) return false;
        this.rateLimitStore[key].push(now);
        try { localStorage.setItem(key, JSON.stringify(this.rateLimitStore[key])); } catch {}
        return true;
      },
      sanitize(str) {
        return typeof DOMPurify !== 'undefined' 
          ? DOMPurify.sanitize(str, { ALLOWED_TAGS: [], ALLOWED_ATTR: [] }).trim() 
          : str.replace(/[<>"'&]/g, '').trim();
      }
    };

    // ============================================
    // VALIDATION MODULE
    // ============================================
    const Validation = {
      email: e => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e),
      phone: p => /^01[0-9]{9}$/.test(p),
      arabicName(s) {
        const t = s.trim();
        if (t.length < 6) return false;
        const w = t.split(/\s+/).filter(Boolean);
        if (w.length < 3) return false;
        return w.every(x => /^[\u0600-\u06FF]{2,}$/.test(x));
      },
      strongPassword(p) {
        return p.length >= 8 && /[a-z]/.test(p) && /[A-Z]/.test(p) && /[0-9]/.test(p) && /[^a-zA-Z0-9]/.test(p);
      },
      passwordEntropy(p) {
        if (!p.length) return 0;
        const cs = (/[a-z]/.test(p)?26:0) + (/[A-Z]/.test(p)?26:0) + (/[0-9]/.test(p)?10:0) + (/[^a-zA-Z0-9]/.test(p)?32:0);
        return p.length * Math.log2(Math.max(cs, 1));
      }
    };

    // ============================================
    // UI MODULE: Toast + Loading
    // ============================================
    const UI = {
      showToast(msg, type = 'info') {
        const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
        const t = document.createElement('div');
        t.className = `toast-notification ${colors[type]} text-white`;
        t.textContent = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 5000);
      },
      showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden'); },
      hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); },
      clearErrors() {
        document.querySelectorAll('[id$="Error"]').forEach(e => e.classList.add('hidden'));
        document.querySelectorAll('input').forEach(i => i.classList.remove('input-error'));
        document.getElementById('loginBlockMsg').classList.add('hidden');
      },
      setButton(btn, loading) {
        if (!UI._locks) UI._locks = new Set();
        if (loading) {
          if (UI._locks.has(btn)) return;
          UI._locks.add(btn);
          btn.disabled = true;
          btn.dataset.o = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
          btn.classList.add('opacity-70');
        } else {
          UI._locks.delete(btn);
          btn.disabled = false;
          btn.innerHTML = btn.dataset.o || btn.innerHTML;
          btn.classList.remove('opacity-70');
        }
      }
    };

    // ============================================
    // FIREBASE INIT
    // ============================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDX-DEv8K5aOyXk12L_3qQNnKGdAui6paE",
      authDomain: "yalla-chemistry-github.firebaseapp.com",
      databaseURL: "https://yalla-chemistry-github-default-rtdb.firebaseio.com",
      projectId: "yalla-chemistry-github",
      storageBucket: "yalla-chemistry-github.firebasestorage.app",
      messagingSenderId: "112757887385",
      appId: "1:112757887385:web:eb77f8fd77bf5503fc4308",
      measurementId: "G-Y1HCV6CYV3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ============================================
    // DOM REFS
    // ============================================
    const $ = id => document.getElementById(id);

    // ============================================
    // IMAGE SWITCHING
    // ============================================
    function toLoginImg() { $('registerImage').style.opacity = '0'; $('loginImage').style.opacity = '1'; }
    function toRegImg() { $('loginImage').style.opacity = '0'; $('registerImage').style.opacity = '1'; }

    function switchTab(tab) {
      UI.clearErrors();
      if (tab === 'login') {
        $('loginTabBtn').classList.add('tab-active'); $('loginTabBtn').classList.remove('text-gray-400');
        $('registerTabBtn').classList.remove('tab-active'); $('registerTabBtn').classList.add('text-gray-400');
        $('loginForm').classList.remove('hidden'); $('registerForm').classList.add('hidden');
        toLoginImg(); setTimeout(() => $('loginEmail').focus(), 100);
      } else {
        $('registerTabBtn').classList.add('tab-active'); $('registerTabBtn').classList.remove('text-gray-400');
        $('loginTabBtn').classList.remove('tab-active'); $('loginTabBtn').classList.add('text-gray-400');
        $('registerForm').classList.remove('hidden'); $('loginForm').classList.add('hidden');
        toRegImg(); setTimeout(() => $('regName').focus(), 100);
      }
    }

    $('loginTabBtn').addEventListener('click', () => switchTab('login'));
    $('registerTabBtn').addEventListener('click', () => switchTab('register'));

    // Password toggle
    $('toggleLoginPassword').addEventListener('click', () => {
      const p = $('loginPassword').type === 'password';
      $('loginPassword').type = p ? 'text' : 'password';
      $('toggleLoginPassword').innerHTML = p ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
    });
    $('toggleRegPassword').addEventListener('click', () => {
      const p = $('regPassword').type === 'password';
      $('regPassword').type = p ? 'text' : 'password';
      $('toggleRegPassword').innerHTML = p ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
    });

    // Password strength
    $('regPassword').addEventListener('input', () => {
      const e = Validation.passwordEntropy($('regPassword').value);
      const s = Math.min((e / 60) * 100, 100);
      $('strengthFill').style.width = s + '%';
      if (s < 25) { $('strengthFill').style.background = '#ef4444'; $('strengthText').textContent = 'ضعيفة'; $('strengthText').style.color = '#ef4444'; }
      else if (s < 50) { $('strengthFill').style.background = '#f59e0b'; $('strengthText').textContent = 'متوسطة'; $('strengthText').style.color = '#f59e0b'; }
      else if (s < 75) { $('strengthFill').style.background = '#3b82f6'; $('strengthText').textContent = 'قوية'; $('strengthText').style.color = '#3b82f6'; }
      else { $('strengthFill').style.background = '#10b981'; $('strengthText').textContent = 'قوية جداً'; $('strengthText').style.color = '#10b981'; }
    });

    // Server block check (CLIENT ONLY READS)
    async function isEmailBlocked(email) {
      try {
        const snap = await get(ref(db, 'blockedEmails/' + email.replace(/\./g, '_')));
        return snap.exists() && Date.now() < snap.val().until ? snap.val().until : null;
      } catch { return null; }
    }

    async function isUserBlocked(uid) {
      try { const s = await get(ref(db, 'students/' + uid)); return s.exists() && s.val().isBlocked === true; } 
      catch { return false; }
    }

    // ============================================
    // FORGOT PASSWORD MODAL
    // ============================================
    $('forgotPasswordBtn').addEventListener('click', () => {
      $('forgotPasswordModal').classList.remove('hidden');
      $('resetEmail').value = $('loginEmail').value || '';
      setTimeout(() => $('resetEmail').focus(), 100);
    });
    $('closeModalBtn').addEventListener('click', () => $('forgotPasswordModal').classList.add('hidden'));
    $('forgotPasswordModal').addEventListener('click', e => { if (e.target === $('forgotPasswordModal')) $('forgotPasswordModal').classList.add('hidden'); });
    
    $('sendResetBtn').addEventListener('click', async () => {
      const email = Security.sanitize($('resetEmail').value);
      if (!email || !Validation.email(email)) {
        $('resetEmailError').textContent = 'بريد غير صالح'; $('resetEmailError').classList.remove('hidden'); return;
      }
      if (!Security.checkRateLimit('reset', 1, 120000)) {
        $('resetRateLimit').textContent = '⏳ انتظر دقيقتين'; $('resetRateLimit').classList.remove('hidden'); return;
      }
      $('sendResetBtn').disabled = true;
      $('sendResetBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
      try {
        await sendPasswordResetEmail(auth, email, { url: location.origin + '/login.html' });
        UI.showToast('📧 تم الإرسال', 'success');
        $('forgotPasswordModal').classList.add('hidden');
      } catch (err) {
        UI.showToast(err.code === 'auth/user-not-found' ? '❌ لا يوجد حساب' : '❌ خطأ', 'error');
      } finally {
        $('sendResetBtn').disabled = false;
        $('sendResetBtn').innerHTML = '<span>إرسال</span><i class="fas fa-paper-plane"></i>';
      }
    });

    // ============================================
    // RESEND VERIFICATION MODAL
    // ============================================
    $('resendVerificationBtn').addEventListener('click', () => {
      $('resendVerificationModal').classList.remove('hidden');
      $('resendVerificationEmail').value = $('loginEmail').value || '';
      setTimeout(() => $('resendVerificationEmail').focus(), 100);
    });
    $('closeVerificationModalBtn').addEventListener('click', () => $('resendVerificationModal').classList.add('hidden'));
    $('resendVerificationModal').addEventListener('click', e => { if (e.target === $('resendVerificationModal')) $('resendVerificationModal').classList.add('hidden'); });
    
    $('sendVerificationBtn').addEventListener('click', async () => {
      const email = Security.sanitize($('resendVerificationEmail').value);
      if (!email || !Validation.email(email)) {
        $('resendVerificationError').textContent = 'بريد غير صالح'; $('resendVerificationError').classList.remove('hidden'); return;
      }
      if (!Security.checkRateLimit('verify', 1, 120000)) {
        $('resendRateLimit').textContent = '⏳ انتظر دقيقتين'; $('resendRateLimit').classList.remove('hidden'); return;
      }
      $('sendVerificationBtn').disabled = true;
      $('sendVerificationBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
      try {
        const u = auth.currentUser;
        if (u && u.email === email) {
          await sendEmailVerification(u);
          UI.showToast('📧 تم إعادة التفعيل', 'success');
        } else {
          UI.showToast('⚠️ سجل دخولك أولاً ليصلك رابط التفعيل', 'warning');
        }
        $('resendVerificationModal').classList.add('hidden');
      } catch (err) {
        UI.showToast('❌ خطأ', 'error');
      } finally {
        $('sendVerificationBtn').disabled = false;
        $('sendVerificationBtn').innerHTML = '<span>إرسال</span><i class="fas fa-envelope"></i>';
      }
    });

    // ============================================
    // ANTI-ABUSE (client fallback)
    // ============================================
    const ABUSE = {
      MAX: 3, BLOCK: 5 * 60 * 1000, KEY: '_abx2',
      get() { 
        try { const r = localStorage.getItem(this.KEY); if (!r) return { a: 0, b: null }; const d = JSON.parse(atob(r)); return (typeof d.a == 'number') ? { a: d.a, b: d.b } : { a: 0, b: null }; } 
        catch { return { a: 0, b: null }; } 
      },
      set(s) { try { localStorage.setItem(this.KEY, btoa(JSON.stringify({ a: s.a, b: s.b }))); } catch {} },
      blocked() { const s = this.get(); if (s.b && Date.now() < s.b) return true; if (s.b && Date.now() >= s.b) { this.set({ a: 0, b: null }); return false; } return false; },
      fail() { const s = this.get(); s.a++; if (s.a >= this.MAX) { s.b = Date.now() + this.BLOCK; this.set(s); return s.a; } this.set(s); return s.a; },
      reset() { this.set({ a: 0, b: null }); $('loginBlockMsg').classList.add('hidden'); }
    };

    if (ABUSE.blocked()) { $('loginBlockMsg').textContent = '⛔ محظور مؤقتاً'; $('loginBlockMsg').classList.remove('hidden'); }

    // ============================================
    // SESSION TIMEOUT
    // ============================================
    let sessionTimer;
    const SESSION_DURATION = 30 * 60 * 1000;
    function resetSession() {
      clearTimeout(sessionTimer);
      if (auth.currentUser) sessionTimer = setTimeout(async () => { try { await signOut(auth); UI.showToast('⏰ انتهت الجلسة', 'warning'); } catch {} }, SESSION_DURATION);
    }
    ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(e => document.addEventListener(e, resetSession));
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') resetSession(); else clearTimeout(sessionTimer); });
    resetSession();

    // ============================================
    // AUTO LOGIN
    // ============================================
    onAuthStateChanged(auth, async user => {
      UI.hideLoading();
      if (user) {
        try {
          if (!user.emailVerified) { UI.showToast('⚠️ فعل بريدك أولاً', 'warning'); await signOut(auth); return; }
          if (await isUserBlocked(user.uid)) { UI.showToast('🚫 محظور', 'error'); await signOut(auth); return; }
          UI.showLoading();
          setTimeout(() => location.href = 'student.html', 500);
        } catch { await signOut(auth); }
      }
    });

    // ============================================
    // LOGIN
    // ============================================
    $('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      UI.clearErrors();
      const em = Security.sanitize($('loginEmail').value), pw = $('loginPassword').value;
      let ok = true;
      if (!em || !Validation.email(em)) { $('loginEmailError').textContent = 'بريد غير صالح'; $('loginEmailError').classList.remove('hidden'); $('loginEmail').classList.add('input-error'); ok = false; }
      if (!pw || pw.length < 6) { $('loginPasswordError').textContent = '6 أحرف على الأقل'; $('loginPasswordError').classList.remove('hidden'); $('loginPassword').classList.add('input-error'); ok = false; }
      if (!ok) return;
      
      const sb = await isEmailBlocked(em);
      if (sb) { $('loginBlockMsg').textContent = `⛔ محظور ${Math.ceil((sb - Date.now()) / 60000)} دقيقة`; $('loginBlockMsg').classList.remove('hidden'); return; }
      if (ABUSE.blocked()) { $('loginBlockMsg').textContent = '⛔ محظور مؤقتاً'; $('loginBlockMsg').classList.remove('hidden'); return; }
      
      UI.setButton($('loginSubmitBtn'), true);
      try {
        const c = await signInWithEmailAndPassword(auth, em, pw);
        if (!c.user.emailVerified) { await signOut(auth); UI.showToast('⚠️ فعل بريدك أولاً', 'warning'); UI.setButton($('loginSubmitBtn'), false); return; }
        if (await isUserBlocked(c.user.uid)) { await signOut(auth); UI.showToast('🚫 محظور', 'error'); UI.setButton($('loginSubmitBtn'), false); return; }
        try { await set(ref(db, 'students/' + c.user.uid + '/lastLogin'), new Date().toISOString()); } catch {}
        ABUSE.reset(); resetSession();
        UI.showToast('✅ أهلاً بك', 'success');
        UI.showLoading();
        setTimeout(() => location.href = 'student.html', 800);
      } catch (err) {
        ABUSE.fail();
        UI.showToast('❌ البريد أو كلمة المرور غير صحيحة', 'error');
      } finally { UI.setButton($('loginSubmitBtn'), false); }
    });

    // ============================================
    // REGISTER
    // ============================================
    $('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      UI.clearErrors();
      const nm = Security.sanitize($('regName').value), sp = Security.sanitize($('regStudentPhone').value), pp = Security.sanitize($('regParentPhone').value), em = Security.sanitize($('regEmail').value), pw = $('regPassword').value;
      let ok = true;
      if (!nm || !Validation.arabicName(nm)) { $('regNameError').textContent = 'اسم عربي ثلاثي'; $('regNameError').classList.remove('hidden'); $('regName').classList.add('input-error'); ok = false; }
      if (!sp || !Validation.phone(sp)) { $('regStudentPhoneError').textContent = '11 رقم'; $('regStudentPhoneError').classList.remove('hidden'); $('regStudentPhone').classList.add('input-error'); ok = false; }
      if (!pp || !Validation.phone(pp)) { $('regParentPhoneError').textContent = '11 رقم'; $('regParentPhoneError').classList.remove('hidden'); $('regParentPhone').classList.add('input-error'); ok = false; }
      if (sp && pp && sp === pp) { UI.showToast('❌ رقمان مختلفان', 'error'); return; }
      if (!em || !Validation.email(em)) { $('regEmailError').textContent = 'بريد غير صالح'; $('regEmailError').classList.remove('hidden'); $('regEmail').classList.add('input-error'); ok = false; }
      if (!pw || !Validation.strongPassword(pw)) { $('regPasswordError').textContent = '8+ أحرف،كبير،رقم،رمز'; $('regPasswordError').classList.remove('hidden'); $('regPassword').classList.add('input-error'); ok = false; }
      if (!ok) return;
      
      UI.setButton($('registerSubmitBtn'), true);
      try {
        const ss = await get(query(ref(db, 'students'), orderByChild('studentPhone'), equalTo(sp)));
        if (ss.exists()) { UI.showToast('⚠️ رقم الطالب مسجل', 'error'); UI.setButton($('registerSubmitBtn'), false); return; }
        const ps = await get(query(ref(db, 'students'), orderByChild('parentPhone'), equalTo(pp)));
        if (ps.exists()) { UI.showToast('⚠️ رقم ولي الأمر مسجل', 'error'); UI.setButton($('registerSubmitBtn'), false); return; }
        
        const c = await createUserWithEmailAndPassword(auth, em, pw);
        const uid = c.user.uid;
        await set(ref(db, 'students/' + uid), { name: nm, studentPhone: sp, parentPhone: pp, email: em, createdAt: new Date().toISOString(), lastLogin: null, userAgent: navigator.userAgent, progress: 0, isBlocked: false });
        await set(ref(db, 'phones/' + sp), uid);
        await sendEmailVerification(c.user);
        await signOut(auth);
        UI.showToast('📧 تم التسجيل. فعل بريدك.', 'success');
        switchTab('login');
        $('loginEmail').value = em;
      } catch (err) {
        UI.showToast(err.code === 'auth/email-already-in-use' ? '⚠️ البريد مستخدم' : '❌ خطأ', 'error');
      } finally { UI.setButton($('registerSubmitBtn'), false); }
    });

    // Enter key
    $('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); $('loginPassword').focus(); } });
    $('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); $('loginSubmitBtn').click(); } });

    UI.hideLoading();
    $('loginEmail').focus();
    console.log('✅ يلا كيمياء v8 - Modular Security Architecture');
  </script>

</body>
</html>
