<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | يلا كيمياء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes floatBG { 0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
        .bg-float{animation:floatBG 20s ease infinite}
    </style>
</head>
<body class="font-cairo bg-gradient-to-br from-[#0f0c29] via-[#302b63] to-[#24243e] min-h-screen flex items-center justify-center p-4">

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getDatabase, ref, set, get, child } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDX-DEv8K5aOyXk12L_3qQNnKGdAui6paE",
        authDomain: "yalla-chemistry-github.firebaseapp.com",
        projectId: "yalla-chemistry-github",
        storageBucket: "yalla-chemistry-github.firebasestorage.app",
        messagingSenderId: "112757887385",
        appId: "1:112757887385:web:eb77f8fd77bf5503fc4308"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    window.loginWithEmail = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            showMessage('✅ مرحباً بك!', 'success');
            setTimeout(() => window.location.href = 'index.html', 1000);
        } catch (e) { showMessage('❌ ' + e.message, 'error'); }
    };

    window.signupWithEmail = async () => {
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        if (!name) { showMessage('❌ الرجاء إدخال اسمك', 'error'); return; }
        if (password.length < 6) { showMessage('❌ كلمة المرور 6 أحرف على الأقل', 'error'); return; }
        try {
            const result = await createUserWithEmailAndPassword(auth, email, password);
            await set(ref(db, 'users/' + result.user.uid), { email, name, points: 0, createdAt: Date.now(), banned: false });
            showMessage('✅ تم إنشاء الحساب بنجاح!', 'success');
            setTimeout(() => window.location.href = 'index.html', 1000);
        } catch (e) { showMessage('❌ ' + e.message, 'error'); }
    };

    window.loginWithGoogle = async () => {
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const userRef = ref(db, 'users/' + result.user.uid);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) {
                await set(userRef, { email: result.user.email, name: result.user.displayName, points: 0, createdAt: Date.now(), banned: false });
            }
            showMessage('✅ تم تسجيل الدخول بنجاح!', 'success');
            setTimeout(() => window.location.href = 'index.html', 1000);
        } catch (e) { showMessage('❌ ' + e.message, 'error'); }
    };

    window.resetPassword = async () => {
        const email = document.getElementById('email').value;
        if (!email) { showMessage('❌ الرجاء إدخال البريد', 'error'); return; }
        try {
            await sendPasswordResetEmail(auth, email);
            showMessage('✅ تم إرسال رابط إعادة التعيين', 'success');
        } catch (e) { showMessage('❌ ' + e.message, 'error'); }
    };

    window.toggleMode = () => {
        const loginDiv = document.getElementById('loginMode');
        const signupDiv = document.getElementById('signupMode');
        const toggleBtn = document.getElementById('modeToggle');
        if (loginDiv.classList.contains('hidden')) {
            loginDiv.classList.remove('hidden');
            signupDiv.classList.add('hidden');
            toggleBtn.innerHTML = 'ليس لديك حساب؟ <span class="text-cyan-400">إنشاء حساب جديد</span>';
        } else {
            loginDiv.classList.add('hidden');
            signupDiv.classList.remove('hidden');
            toggleBtn.innerHTML = 'لديك حساب بالفعل؟ <span class="text-cyan-400">تسجيل الدخول</span>';
        }
    };

    function showMessage(msg, type) {
        const div = document.getElementById('message');
        div.textContent = msg;
        div.className = `p-3 rounded-lg mb-4 text-center ${type === 'success' ? 'bg-green-500/20 text-green-400 border border-green-500' : 'bg-red-500/20 text-red-400 border border-red-500'}`;
        div.classList.remove('hidden');
        setTimeout(() => div.classList.add('hidden'), 3000);
    }
</script>

<div class="relative w-full max-w-md">
    <div class="absolute -top-20 -left-20 w-64 h-64 bg-cyan-500 rounded-full filter blur-3xl opacity-20 bg-float"></div>
    <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-purple-600 rounded-full filter blur-3xl opacity-20 bg-float"></div>
    <div class="relative bg-white/10 backdrop-blur-xl rounded-2xl p-6 md:p-8 border border-white/20">
        <div class="text-center mb-6">
            <img src="https://videotourl.com/images/1778184631873-622d780a-8224-4f6e-bf20-3df78ed623b1.jpg" class="w-20 h-20 md:w-24 md:h-24 rounded-full mx-auto mb-3 border-2 border-cyan-400">
            <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">يلا كيمياء</h1>
            <p class="text-gray-400 text-sm">مستر زياد مبروك</p>
        </div>
        
        <div id="message" class="hidden"></div>
        
        <div id="loginMode">
            <input type="email" id="email" placeholder="📧 البريد الإلكتروني" class="w-full mb-3 px-4 py-3 bg-white/10 rounded-xl border border-white/20 text-white focus:border-cyan-400 outline-none">
            <input type="password" id="password" placeholder="🔒 كلمة المرور" class="w-full mb-4 px-4 py-3 bg-white/10 rounded-xl border border-white/20 text-white focus:border-cyan-400 outline-none">
            <button onclick="loginWithEmail()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 py-3 rounded-xl font-bold hover:scale-105 transition">🚀 تسجيل الدخول</button>
            <button onclick="resetPassword()" class="text-sm text-cyan-400 hover:text-cyan-300 mt-3 block text-center w-full">نسيت كلمة المرور؟</button>
        </div>
        
        <div id="signupMode" class="hidden">
            <input type="text" id="signupName" placeholder="👤 الاسم الكامل" class="w-full mb-3 px-4 py-3 bg-white/10 rounded-xl border border-white/20 text-white focus:border-cyan-400 outline-none">
            <input type="email" id="signupEmail" placeholder="📧 البريد الإلكتروني" class="w-full mb-3 px-4 py-3 bg-white/10 rounded-xl border border-white/20 text-white focus:border-cyan-400 outline-none">
            <input type="password" id="signupPassword" placeholder="🔒 كلمة المرور (6 أحرف)" class="w-full mb-4 px-4 py-3 bg-white/10 rounded-xl border border-white/20 text-white focus:border-cyan-400 outline-none">
            <button onclick="signupWithEmail()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 py-3 rounded-xl font-bold hover:scale-105 transition">✨ إنشاء حساب جديد</button>
        </div>
        
        <div class="relative my-6"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/20"></div></div><div class="relative flex justify-center text-sm"><span class="px-2 bg-transparent text-gray-400">أو</span></div></div>
        
        <button onclick="loginWithGoogle()" class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition">📧 Google</button>
        
        <p id="modeToggle" onclick="toggleMode()" class="text-center text-sm text-gray-400 cursor-pointer hover:text-cyan-400 transition mt-4">ليس لديك حساب؟ <span class="text-cyan-400">إنشاء حساب جديد</span></p>
        <a href="index.html" class="block text-center mt-4 text-sm text-gray-500 hover:text-gray-300 transition">← العودة للرئيسية</a>
    </div>
</div>
</body>
</html>
