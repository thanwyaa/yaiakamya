<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة يلا كيمياء | مستر زياد مبروك</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; margin: 0; background-color: white; }
        .red-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .teacher-frame { border: 6px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        #root { min-height: 100vh; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { Play, Youtube, Send, MessageCircle, BookOpen, Trophy, X, Video, Flame, Menu, GraduationCap, Zap } = lucide;

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            // رابط صورتك الشخصية
            const teacherImg = "https://i.ibb.co/9j74J07/42938.png";

            const navLinks = [
                { id: 'home', label: 'الرئيسية' },
                { id: 'lectures', label: 'المحاضرات' },
                { id: 'solutions', label: 'حل الكتب' },
                { id: 'contact', label: 'تواصل معنا' }
            ];

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 h-20 px-6 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-full overflow-hidden border-2 border-rose-600">
                                <img src={teacherImg} className="w-full h-full object-cover" alt="Mr Ziad" />
                            </div>
                            <h1 className="text-xl font-black text-rose-600 italic">يلا كيمياء</h1>
                        </div>
                        <div className="hidden lg:flex items-center gap-8">
                            {navLinks.map(link => (
                                <button key={link.id} onClick={() => setCurrentPage(link.id)} 
                                    className={`font-bold ${currentPage === link.id ? 'text-rose-600' : 'text-gray-500 hover:text-rose-600'}`}>
                                    {link.label}
                                </button>
                            ))}
                        </div>
                        <button onClick={() => setIsMenuOpen(true)} className="lg:hidden text-rose-600">
                            <Menu size={28}/>
                        </button>
                    </nav>

                    {/* Main Content */}
                    <div className="pt-20">
                        {currentPage === 'home' && (
                            <section className="py-20 px-6 max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
                                <div className="text-center lg:text-right space-y-6">
                                    <div className="inline-block bg-rose-50 text-rose-600 px-4 py-1 rounded-full text-sm font-bold">🔥 منصة مستر زياد مبروك</div>
                                    <h1 className="text-5xl lg:text-7xl font-black text-gray-900 leading-tight">ملك الكيمياء <br/><span className="text-rose-600">في جيبك</span></h1>
                                    <p className="text-lg text-gray-500 font-medium">كل اللي تحتاجه في الكيمياء لتانية ثانوي (شرح، حل، معسكرات) في مكان واحد.</p>
                                    <button onClick={() => setCurrentPage('lectures')} className="red-gradient text-white px-12 py-4 rounded-2xl font-black text-xl shadow-lg">ابدأ المذاكرة الآن</button>
                                </div>
                                <div className="flex justify-center">
                                    <div className="w-80 h-80 lg:w-[450px] lg:h-[450px] bg-rose-600 rounded-[3rem] overflow-hidden teacher-frame rotate-2 transition-transform hover:rotate-0 duration-500">
                                        <img src={teacherImg} className="w-full h-full object-cover -rotate-2 scale-110 mt-6" alt="Teacher" />
                                    </div>
                                </div>
                            </section>
                        )}

                        {currentPage !== 'home' && (
                            <div className="p-10 text-center">
                                <h2 className="text-2xl font-bold">هذا القسم متاح الآن وجاري رفع المحتوى..</h2>
                                <button onClick={() => setCurrentPage('home')} className="mt-4 text-rose-600 font-bold underline">العودة للرئيسية</button>
                            </div>
                        )}
                    </div>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-50 bg-white p-10 flex flex-col gap-6">
                            <button onClick={() => setIsMenuOpen(false)} className="self-end text-rose-600"><X size={40}/></button>
                            {navLinks.map(link => (
                                <button key={link.id} onClick={() => { setCurrentPage(link.id); setIsMenuOpen(false); }} 
                                    className="text-2xl font-black text-right border-b border-gray-50 pb-4">{link.label}</button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
