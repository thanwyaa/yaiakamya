<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة يلا كيمياء | مستر زياد مبروك</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0c1611; color: #e0e7e1; margin: 0; overflow-x: hidden; }
        .gold-glow { text-shadow: 0 0 10px rgba(197, 160, 46, 0.5); color: #c5a02e; }
        .master-logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #c5a02e; box-shadow: 0 0 20px rgba(197, 160, 46, 0.4); transition: 0.5s; }
        .master-logo:hover { transform: scale(1.1) rotate(10deg); box-shadow: 0 0 30px #c5a02e; }
        .lecture-card { background: rgba(26, 43, 35, 0.6); border: 1px solid rgba(197, 160, 46, 0.1); border-radius: 25px; transition: 0.3s; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .lecture-card:hover { border-color: #c5a02e; background: rgba(26, 43, 35, 0.9); transform: translateX(-5px); }
        .phone-bounce { animation: phoneBounce 2s infinite ease-in-out; }
        @keyframes phoneBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        /* أنيميشن الخلفية المتحركة */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a2b23 0%, #0c1611 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- مخزن البيانات الضخم ---
        const lecturesData = [
            { 
                category: "المحاضرات الأساسية (الشرح)",
                items: [
                    { id: "exp_1", title: "المحاضرة الأولى: أنواع الروابط والرابطة الآيونية", url: "https://youtu.be/3SQy6j9qdX0" },
                    { id: "exp_2", title: "شرح الدرس الثاني: نظرية الثمانيات بالتفصيل", url: "https://youtu.be/KIdHLm_BtRt" },
                    { id: "exp_3", title: "شرح الدرس الثاني: الجزء الثاني والتهجين", url: "https://youtu.be/1JIVypRTUxI" },
                    { id: "exp_4", title: "شرح الدرس الثالث: نظرية VSEPR كاملة", url: "https://youtu.be/u7rTOP0lpak" }
                ]
            },
            {
                category: "حل الكتب الخارجية (الوافي)",
                items: [
                    { id: "wafi_1", title: "حل كتاب الوافي: الدرس الأول - الجزء 1", url: "https://youtu.be/hh34oRhXBN8" },
                    { id: "wafi_2", title: "حل كتاب الوافي: الدرس الأول - الجزء 2", url: "https://youtu.be/gMqM3Uf2mYQ" },
                    { id: "wafi_3", title: "حل كتاب الوافي: الدرس الثاني كاملاً", url: "https://youtu.be/NGF1Fq1C0Ko" }
                ]
            },
            {
                category: "حل الكتب الخارجية (الامتحان)",
                items: [
                    { id: "exam_1", title: "حل كتاب الامتحان: الدرس الأول - الجزء 1", url: "https://youtu.be/0QY_ZaZ8_40" },
                    { id: "exam_2", title: "حل كتاب الامتحان: الدرس الأول - الجزء 2", url: "https://youtu.be/ZgZeeNdcbFE" }
                ]
            }
        ];

        const App = () => {
            const [completed, setCompleted] = useState([]);
            const [showInstall, setShowInstall] = useState(true);

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('ziad_chemistry_progress')) || [];
                setCompleted(saved);
            }, []);

            const toggleCheck = (id) => {
                const updated = completed.includes(id) ? completed.filter(i => i !== id) : [...completed, id];
                setCompleted(updated);
                localStorage.setItem('ziad_chemistry_progress', JSON.stringify(updated));
            };

            const total = lecturesData.reduce((acc, curr) => acc + curr.items.length, 0);
            const progress = Math.round((completed.length / total) * 100);

            return (
                <div className="min-h-screen">
                    <div className="bg-animate"></div>
                    
                    {/* هيدر المنصة */}
                    <nav className="fixed top-0 w-full z-50 bg-[#0c1611]/90 backdrop-blur-lg border-b border-[#c5a02e]/20 p-4">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <img src="42938.png" className="master-logo" alt="لوجو المستر" />
                                <div>
                                    <h1 className="gold-glow font-black text-2xl">يلا كيمياء</h1>
                                    <p className="text-white/40 text-xs font-bold">مستر زياد مبروك</p>
                                </div>
                            </div>
                            <div className="text-left">
                                <span className="text-[#c5a02e] font-black text-xl">{progress}%</span>
                                <p className="text-[10px] text-white/30 uppercase">مستوى الإنجاز</p>
                            </div>
                        </div>
                    </nav>

                    {/* خط السير العلوي */}
                    <div className="fixed top-[112px] left-0 w-full h-1.5 bg-white/5 z-50">
                        <div className="h-full bg-gradient-to-r from-[#c5a02e] to-yellow-400 shadow-[0_0_15px_#c5a02e] transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                    </div>

                    {/* المحاضرات */}
                    <main className="pt-40 pb-48 px-6 max-w-4xl mx-auto">
                        <div className="text-center mb-12">
                            <h2 className="text-4xl font-black mb-4">خريطة طريق التفوق 🎯</h2>
                            <p className="text-white/50 font-bold">كل اللي تحتاجه في الكيمياء في مكان واحد</p>
                        </div>

                        {lecturesData.map((section, idx) => (
                            <div key={idx} className="mb-12">
                                <h3 className="text-[#c5a02e] font-black text-xl mb-6 flex items-center gap-3 border-r-4 border-[#c5a02e] pr-4">
                                    {section.category}
                                </h3>
                                <div className="grid gap-4">
                                    {section.items.map(lec => (
                                        <div key={lec.id} className="lecture-card group">
                                            <div className="flex items-center gap-5">
                                                <button onClick={() => toggleCheck(lec.id)} className={`transition-all ${completed.includes(lec.id) ? 'text-[#c5a02e]' : 'text-white/10'}`}>
                                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                                </button>
                                                <span className={`font-black transition-all ${completed.includes(lec.id) ? 'text-white/20 line-through' : 'text-white'}`}>{lec.title}</span>
                                            </div>
                                            <a href={lec.url} target="_blank" className="bg-[#c5a02e] text-[#111d17] p-3 rounded-2xl hover:scale-110 transition-transform">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.11 1 12 1 12s0 3.89.42 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.89 23 12 23 12s0-3.89-.42-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>
                                            </a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* التنبيه الذكي */}
                    {showInstall && (
                        <div className="fixed bottom-8 left-6 right-6 bg-gradient-to-br from-[#1a2b23] to-[#0c1611] border-2 border-[#c5a02e] rounded-[35px] p-6 z-[1000] flex items-center gap-6 shadow-2xl">
                            <div className="phone-bounce relative w-16 h-28 bg-gray-900 rounded-2xl border-4 border-gray-700 flex items-center justify-center flex-shrink-0 shadow-2xl">
                                <div className="absolute top-1.5 w-8 h-1 bg-gray-700 rounded-full"></div>
                                <img src="42938.png" className="w-10 h-10 rounded-full border border-[#c5a02e]" alt="لوجو" />
                                <div className="absolute bottom-2 text-[6px] text-[#c5a02e] font-black">YALLA CHEM</div>
                            </div>
                            <div className="flex-1 text-right">
                                <h4 className="text-[#c5a02e] font-black text-xl mb-2">ثبت المنصة الآن! ⚡</h4>
                                <p className="text-white/80 text-xs font-bold leading-relaxed">تابع مستر زياد مبروك (يلا كيمياء) وثبت المنصة على موبايلك عشان توصلك المحاضرات والملفات فور نزولها.</p>
                                <button className="mt-4 bg-[#c5a02e] text-[#111d17] px-6 py-2 rounded-full text-xs font-black shadow-lg">إضافة للشاشة الرئيسية</button>
                            </div>
                            <button onClick={() => setShowInstall(false)} className="text-white/20 self-start p-2">✕</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
