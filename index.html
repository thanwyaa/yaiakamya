<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yalla Kimya | مع مستر زياد مبروك</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            width: 50px;
            height: 50px;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-blue-900 to-cyan-900 min-h-screen">
    <div id="app" class="min-h-screen">
        <!-- Loading -->
        <div class="flex flex-col items-center justify-center min-h-screen">
            <div class="loading-spinner mb-4"></div>
            <p class="text-white text-lg">🧪 Yalla Kimya | جاري التحميل...</p>
        </div>
    </div>

    <script>
        // Firebase Configuration - ضع بياناتك الحقيقية هنا يا باشا!
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKeyExample123456",  // ❗غيرها ببياناتك الحقيقية
            authDomain: "yalla-kimya.firebaseapp.com",
            projectId: "yalla-kimya",
            storageBucket: "yalla-kimya.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Main App
        async function initApp() {
            const appDiv = document.getElementById('app');
            
            // Check if user is logged in
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    // Get user data
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const userData = userDoc.data();
                    showMainApp(user, userData);
                } else {
                    showLoginScreen();
                }
            });
        }

        function showLoginScreen() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass-card rounded-2xl p-8 max-w-md w-full text-center">
                        <div class="text-6xl mb-4">🧪</div>
                        <h1 class="text-3xl font-bold text-white mb-2">Yalla Kimya</h1>
                        <p class="text-white/70 mb-8">مع مستر زياد مبروك</p>
                        
                        <div class="space-y-4">
                            <button onclick="loginWithGoogle()" class="w-full py-3 bg-white/20 rounded-xl text-white font-semibold hover:bg-white/30 transition">
                                🍕 تسجيل الدخول بجوجل
                            </button>
                            
                            <div class="relative my-6">
                                <div class="absolute inset-0 flex items-center">
                                    <div class="w-full border-t border-white/20"></div>
                                </div>
                                <div class="relative flex justify-center text-sm">
                                    <span class="px-2 bg-transparent text-white/50">أو</span>
                                </div>
                            </div>
                            
                            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <button onclick="loginWithEmail()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-semibold">
                                دخول
                            </button>
                            
                            <p class="text-white/50 text-sm mt-4">
                                ليس لديك حساب؟ 
                                <a href="#" onclick="showRegister()" class="text-cyan-400">إنشاء حساب</a>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function showRegister() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass-card rounded-2xl p-8 max-w-md w-full text-center">
                        <div class="text-6xl mb-4">📝</div>
                        <h1 class="text-3xl font-bold text-white mb-2">إنشاء حساب</h1>
                        <p class="text-white/70 mb-8">انضم إلى Yalla Kimya</p>
                        
                        <div class="space-y-4">
                            <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <input type="password" id="regPassword" placeholder="كلمة المرور" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <button onclick="registerWithEmail()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-semibold">
                                إنشاء حساب
                            </button>
                            
                            <p class="text-white/50 text-sm mt-4">
                                لديك حساب؟ 
                                <a href="#" onclick="showLoginScreen()" class="text-cyan-400">تسجيل الدخول</a>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function showMainApp(user, userData) {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen">
                    <!-- Navbar -->
                    <nav class="fixed top-0 w-full bg-black/50 backdrop-blur-lg border-b border-white/10 z-50">
                        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="text-2xl">🧪</span>
                                <span class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">Yalla Kimya</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-yellow-400">🪙 ${userData?.coins || 0}</span>
                                <button onclick="logout()" class="px-4 py-2 bg-red-500 rounded-lg text-sm">خروج</button>
                            </div>
                        </div>
                    </nav>
                    
                    <!-- Hero Section -->
                    <div class="pt-20 min-h-screen flex items-center justify-center text-center px-4">
                        <div>
                            <h1 class="text-6xl md:text-7xl font-bold mb-4 bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                                Yalla Kimya
                            </h1>
                            <p class="text-2xl text-white mb-2">مع <span class="text-yellow-400 font-bold">مستر زياد مبروك</span></p>
                            <p class="text-white/70 mb-8 max-w-2xl">👨‍🔬 أسهل وأسرع طريقة لفهم الكيمياء</p>
                            
                            <div class="flex flex-wrap gap-4 justify-center">
                                <button onclick="showLectures()" class="px-8 py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl font-bold">
                                    🚀 ابدأ التعلم
                                </button>
                            </div>
                            
                            <div class="mt-12 grid grid-cols-2 md:grid-cols-4 gap-6 max-w-3xl mx-auto">
                                <div><div class="text-2xl font-bold text-white">5000+</div><div class="text-white/50 text-sm">طالب</div></div>
                                <div><div class="text-2xl font-bold text-white">50+</div><div class="text-white/50 text-sm">محاضرة</div></div>
                                <div><div class="text-2xl font-bold text-white">1000+</div><div class="text-white/50 text-sm">سؤال</div></div>
                                <div><div class="text-2xl font-bold text-white">4.9</div><div class="text-white/50 text-sm">تقييم</div></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Auth Functions
        window.loginWithGoogle = async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const userRef = db.collection('users').doc(result.user.uid);
                const userSnap = await userRef.get();
                if (!userSnap.exists) {
                    await userRef.set({
                        name: result.user.displayName,
                        email: result.user.email,
                        coins: 100,
                        role: 'student',
                        createdAt: new Date()
                    });
                }
                alert('تم تسجيل الدخول بنجاح!');
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        window.loginWithEmail = async () => {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            if (!email || !password) {
                alert('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                alert('تم تسجيل الدخول بنجاح!');
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        window.registerWithEmail = async () => {
            const name = document.getElementById('regName')?.value;
            const email = document.getElementById('regEmail')?.value;
            const password = document.getElementById('regPassword')?.value;
            if (!name || !email || !password) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(result.user.uid).set({
                    name: name,
                    email: email,
                    coins: 100,
                    role: 'student',
                    createdAt: new Date()
                });
                alert('تم إنشاء الحساب بنجاح!');
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        window.logout = async () => {
            await auth.signOut();
            showLoginScreen();
        };

        window.showLectures = () => {
            alert('جاري تحميل المحاضرات... سيتم إضافتها قريباً!');
        };

        window.showRegister = showRegister;
        window.showLoginScreen = showLoginScreen;

        // Start the app
        initApp();
    </script>
</body>
</html>
