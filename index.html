<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة يلا كيمياء | مستر زياد مبروك</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* تحميل أفخم خط عربي */
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;400;600;700&display=swap');
        
        body { 
            font-family: 'Readex Pro', sans-serif; 
            margin: 0; 
            background-color: #fcfcfc; 
            color: #1a1a1a;
        }

        .red-gradient-text {
            background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-btn {
            background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);
            box-shadow: 0 10px 25px -5px rgba(225, 29, 72, 0.4);
            transition: all 0.3s ease;
        }

        .main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(225, 29, 72, 0.5);
        }

        .teacher-frame {
            border: 12px solid white;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.15);
            border-radius: 60px;
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Play, Youtube, BookOpen, Trophy, X, Menu, Flame, Send, MessageCircle, ArrowLeft, Video, Star, GraduationCap, Calendar, Facebook, Instagram } = lucide;

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            // رابط صورتك الشخصية المعتمد
            const teacherImg = "https://i.ibb.co/9j74J07/42938.png";

            const lectures = [
                { title: "المحاضرة الأولى: أنواع الروابط", url: "https://youtu.be/3SQy6j9qdX0" },
                { title: "الدرس الثاني: نظرية الثمانيات", url: "https://youtu.be/KIdHLm_BtRt" },
                { title: "الدرس الثاني: التهجين", url: "https://youtu.be/1JIVypRTUxI" },
                { title: "الدرس الثالث: نظرية VSEPR", url: "https://youtu.be/u7rTOP0lpak" },
                { title: "الدرس الثالث والرابع: الروابط الفيزيائية", url: "https://youtu.be/UFOsYtmHuCc" }
            ];

            const solutions = [
                { title: "حل كتاب الوافي - الدرس 1", url: "https://youtu.be/hh34oRhXBN8" },
                { title: "حل كتاب الامتحان - الدرس 1", url: "https://youtu.be/0QY_ZaZ8_40" }
            ];

            const navLinks = [
                { id: 'home', label: 'الرئيسية' },
                { id: 'lectures', label: 'المحاضرات' },
                { id: 'solutions', label: 'حل الكتب' },
                { id: 'camp', label: 'معسكر الشقيان' },
                { id: 'contact', label: 'تواصل معنا' }
            ];

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 nav-glass h-20 px-6 lg:px-20 flex items-center justify-between">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentPage('home')}>
                            <img src={teacherImg} className="w-12 h-12 rounded-full border-2 border-rose-600 object-cover shadow-sm" alt="Logo" />
                            <div className="flex flex-col">
                                <h1 className="text-xl font-bold text-gray-900 leading-none tracking-tighter">يلا كيمياء</h1>
                                <span className="text-[10px] text-rose-600 font-bold uppercase tracking-widest">Ziad Mabrouk</span>
                            </div>
                        </div>

                        <div className="hidden lg:flex gap-8">
                            {navLinks.map(link => (
                                <button key={link.id} onClick={() => setCurrentPage(link.id)} 
                                    className={`text-sm font-bold transition-all ${currentPage === link.id ? 'text-rose-600 border-b-2 border-rose-600 pb-1' : 'text-gray-500 hover:text-rose-600'}`}>
                                    {link.label}
                                </button>
                            ))}
                        </div>

                        <button onClick={() => setIsMenuOpen(true)} className="lg:hidden text-gray-900">
                            <Menu size={28}/>
                        </button>
                    </nav>

                    {/* Main Content */}
                    <div className="pt-20">
                        {currentPage === 'home' && (
                            <div className="animate-in fade-in duration-700">
                                {/* Hero Section */}
                                <section className="relative py-16 lg:py-28 px-6 lg:px-20 grid lg:grid-cols-2 gap-12 items-center overflow-hidden">
                                    <div className="absolute top-0 right-0 w-96 h-96 bg-rose-100 rounded-full blur-3xl opacity-50 -z-10"></div>
                                    <div className="text-center lg:text-right space-y-8">
                                        <div className="inline-flex items-center gap-2 bg-rose-50 border border-rose-100 px-4 py-2 rounded-full text-xs font-bold text-rose-600 uppercase tracking-tight">
                                            <Flame size={14}/> المنصة الرسمية لمستر زياد مبروك
                                        </div>
                                        <h1 className="text-5xl lg:text-7xl font-bold text-gray-900 leading-[1.1]">
                                            إمبراطور الكيمياء <br/>
                                            <span className="red-gradient-text">في ثوبها الجديد</span>
                                        </h1>
                                        <p className="text-lg text-gray-500 font-medium max-w-xl mx-auto lg:mx-0 leading-relaxed">
                                            مش مجرد شرح، دي تجربة تعليمية هتوصلك للـ 60/60 في الكيمياء. كل محاضرات تانية ثانوي، حل الكتب، والمراجعات في مكان واحد.
                                        </p>
                                        <div className="flex flex-wrap gap-4 justify-center lg:justify-start">
                                            <button onClick={() => setCurrentPage('lectures')} className="main-btn text-white px-10 py-4 rounded-2xl font-bold text-lg flex items-center gap-2">
                                                ابدأ المذاكرة الآن <Play size={20} fill="white"/>
                                            </button>
                                            <button onClick={() => setCurrentPage('camp')} className="bg-white border-2 border-gray-100 text-gray-700 px-10 py-4 rounded-2xl font-bold text-lg hover:bg-gray-50 transition-all">
                                                معسكر الشقيان 🔥
                                            </button>
                                        </div>
                                    </div>
                                    <div className="flex justify-center relative">
                                        <div className="teacher-frame w-80 h-80 lg:w-[480px] lg:h-[480px] bg-rose-600 overflow-hidden animate-float">
                                            <img src={teacherImg} className="w-full h-full object-cover scale-110 mt-10" alt="Master Ziad" />
                                        </div>
                                    </div>
                                </section>

                                {/* Stats Section */}
                                <section className="py-20 px-6 lg:px-20 grid md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                    {[
                                        { title: "محاضرات مجانية", count: "+150", icon: <Video className="text-rose-600"/> },
                                        { title: "طالب متفوق", count: "+20K", icon: <Star className="text-rose-600"/> },
                                        { title: "ساعة شرح", count: "+500", icon: <Play className="text-rose-600"/> }
                                    ].map((stat, i) => (
                                        <div key={i} className="bg-white p-8 rounded-[2.5rem] border border-gray-50 shadow-sm flex items-center gap-6 hover:shadow-md transition-all">
                                            <div className="w-16 h-16 bg-rose-50 rounded-2xl flex items-center justify-center">{stat.icon}</div>
                                            <div>
                                                <h3 className="text-3xl font-bold text-gray-900">{stat.count}</h3>
                                                <p className="text-gray-400 font-bold text-sm">{stat.title}</p>
                                            </div>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        )}

                        {currentPage === 'lectures' && (
                            <section className="py-20 px-6 lg:px-20 max-w-7xl mx-auto">
                                <h2 className="text-4xl font-bold text-center mb-16">محاضرات الشرح - تانية ثانوي</h2>
                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {lectures.map((video, i) => (
                                        <div key={i} className="bg-white rounded-[2.5rem] overflow-hidden border border-gray-100 group shadow-sm hover:shadow-xl transition-all">
                                            <div className="aspect-video bg-gray-200 relative">
                                                <img src={`https://img.youtube.com/vi/${video.url.split('/').pop()}/maxresdefault.jpg`} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                                <a href={video.url} target="_blank" className="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <div className="w-16 h-16 bg-rose-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-rose-600/50"><Play fill="white"/></div>
                                                </a>
                                            </div>
                                            <div className="p-8">
                                                <h4 className="font-bold text-lg mb-4 line-clamp-2">{video.title}</h4>
                                                <a href={video.url} target="_blank" className="text-rose-600 font-bold flex items-center gap-2 hover:gap-4 transition-all">مشاهدة الآن <ArrowLeft size={18}/></a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </div>

                    {/* Mobile Sidebar */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[100] bg-white p-10 flex flex-col gap-6 lg:hidden animate-in slide-in-from-right">
                            <button onClick={() => setIsMenuOpen(false)} className="self-end text-rose-600"><X size={40}/></button>
                            {navLinks.map(link => (
                                <button key={link.id} onClick={() => { setCurrentPage(link.id); setIsMenuOpen(false); }} className="text-3xl font-bold text-right border-b border-gray-50 pb-4">{link.label}</button>
                            ))}
                        </div>
                    )}
                    
                    <footer className="py-12 border-t border-gray-100 text-center text-gray-400 font-bold text-sm">
                        جميع الحقوق محفوظة لمنصة يلا كيمياء - مستر زياد مبروك © 2026
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
