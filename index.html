        /* Custom Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes floatReverse {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes glow {
            0% { text-shadow: 0 0 5px rgba(0,212,255,0.5); }
            100% { text-shadow: 0 0 20px rgba(0,212,255,0.8); }
        }
        @keyframes particle {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-reverse { animation: floatReverse 6s ease-in-out infinite; }
        .animate-spin-slow { animation: spin 20s linear infinite; }
        .animate-pulse-slow { animation: pulse 3s ease-in-out infinite; }
        .animate-glow { animation: glow 2s ease-in-out infinite alternate; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .glass-dark {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            animation: particle 8s linear infinite;

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(45deg, #00d4ff, #7b2cbf); border-radius: 4px; }
        
        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,212,255,0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }
        
        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient 3s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Theme Transitions */
        * { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
        
        /* Light Mode Overrides */
        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);

            background: rgba(255,255,255,0.7);

        body.light-mode .text-white\/50 { color: #6a6a8a !important; }
        body.light-mode .text-gray-400 { color: #6a6a8a !important; }

                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                particle.style.fontSize = (Math.random() * 20 + 15) + 'px';
                particle.style.opacity = Math.random() * 0.3;
                particlesDiv.appendChild(particle);
            }

        createParticles();

        // Theme Toggle
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            if (currentTheme === 'dark') {
                document.body.classList.remove('light-mode');
            } else {
                document.body.classList.add('light-mode');
            }
            localStorage.setItem('theme', currentTheme);
            renderPage();
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            currentTheme = savedTheme;
            if (currentTheme === 'light') document.body.classList.add('light-mode');
        }

        // Require Auth Modal
        function showRequireAuthModal(action, callback) {
            const modal = document.createElement('div');

                    <div class="flex flex-col gap-3">
                        <button onclick="closeModalAndLogin()" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-semibold">
                            تسجيل الدخول
                        </button>
                        <button onclick="closeModal()" class="px-6 py-3 glass rounded-xl text-white">
                            إلغاء
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            window.closeModal = () => {
                modal.remove();
                if (callback) callback(false);
            };
            window.closeModalAndLogin = () => {
                modal.remove();
                showLoginScreen();
            };
        }

        // Load Live Stats
        async function loadLiveStats() {
            try {
                const usersSnap = await db.collection('users').where('role', '==', 'student').get();
                const lecturesSnap = await db.collection('lectures').get();
                const stat1 = document.getElementById('stat1');
                const stat2 = document.getElementById('stat2');
                const stat3 = document.getElementById('stat3');
                if (stat1) stat1.innerText = usersSnap.size + '+';
                if (stat2) stat2.innerText = lecturesSnap.size + '+';
                if (stat3) stat3.innerText = (usersSnap.size * 12) + '+';
            } catch(e) { console.error(e); }
        }
        setInterval(loadLiveStats, 5000);
        setTimeout(loadLiveStats, 1000);

        function checkAuthForFullCourse() {
            if (currentUser) {
                alert('🚀 سيتم فتح جميع المحاضرات قريباً!');
            } else {
                showRequireAuthModal('بدء الكورس الكامل', () => {});
            }
        }

        function showProfile() {
            if (currentUser) {
                alert(`📊 مرحباً ${currentUserData?.name || currentUser.email}\n🪙 عملاتك: ${currentUserData?.coins || 0}\n📚 عدد المحاضرات المكتملة: ${currentUserData?.quizzesCompleted || 0}`);
            } else {
                showRequireAuthModal('مشاهدة ملفك الشخصي', () => {});
            }
        }

        // Auth Functions
        function showLoginScreen() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass rounded-2xl p-8 max-w-md w-full">
                        <div class="text-center">
                            <div class="text-6xl mb-4 animate-bounce">🧪</div>
                            <h1 class="text-3xl font-bold gradient-text mb-2">تسجيل الدخول</h1>
                        </div>
                        <div class="space-y-4 mt-6">
                            <button onclick="loginWithGoogle()" class="w-full py-3 glass rounded-xl text-white font-semibold hover:bg-white/20 transition flex items-center justify-center gap-2">
                                <i class="fab fa-google"></i> Google تسجيل الدخول بـ
                            </button>
                            <div class="relative my-4"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/20"></div></div><div class="relative flex justify-center"><span class="px-2 bg-transparent text-white/50">أو</span></div></div>
                            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20">
                            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20">
                            <button onclick="loginWithEmail()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-semibold">دخول</button>
                            <p class="text-center text-white/50">ليس لديك حساب؟ <a href="#" onclick="showRegisterScreen()" class="text-cyan-400">إنشاء حساب</a></p>
                            <button onclick="renderPage()" class="w-full py-2 text-white/50 hover:text-white transition">← العودة للرئيسية</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function showRegisterScreen() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass rounded-2xl p-8 max-w-md w-full">
                        <div class="text-center"><div class="text-6xl mb-4">📝</div><h1 class="text-3xl font-bold gradient-text mb-2">إنشاء حساب</h1></div>
                        <div class="space-y-4 mt-6">
                            <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20">
                            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20">
                            <input type="password" id="regPassword" placeholder="كلمة المرور (6+ أحرف)" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20">
                            <button onclick="registerWithEmail()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-semibold">إنشاء حساب</button>
                            <p class="text-center text-white/50">لديك حساب؟ <a href="#" onclick="showLoginScreen()" class="text-cyan-400">تسجيل الدخول</a></p>
                            <button onclick="renderPage()" class="w-full py-2 text-white/50 hover:text-white transition">← العودة للرئيسية</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.loginWithGoogle = async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const userRef = db.collection('users').doc(result.user.uid);
                if (!(await userRef.get()).exists) {
                    await userRef.set({ name: result.user.displayName, email: result.user.email, coins: 0, role: 'student', createdAt: new Date(), quizzesCompleted: 0 });
                }
                alert('✅ تم تسجيل الدخول بنجاح!');
                renderPage();
            } catch(e) { alert('❌ خطأ: ' + e.message); }
        };

        window.loginWithEmail = async () => {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            if (!email || !password) { alert('الرجاء إدخال البريد وكلمة المرور'); return; }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                alert('✅ تم تسجيل الدخول بنجاح!');
                renderPage();
            } catch(e) { alert('❌ خطأ: ' + e.message); }
        };

        window.registerWithEmail = async () => {
            const name = document.getElementById('regName')?.value;
            const email = document.getElementById('regEmail')?.value;
            const password = document.getElementById('regPassword')?.value;
            if (!name || !email || !password) { alert('الرجاء ملء جميع الحقول'); return; }
            if (password.length < 6) { alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(result.user.uid).set({ name, email, coins: 0, role: 'student', createdAt: new Date(), quizzesCompleted: 0 });
                alert('✅ تم إنشاء الحساب بنجاح!');
                renderPage();
            } catch(e) { alert('❌ خطأ: ' + e.message); }
        };

        window.logout = async () => { await auth.signOut(); currentUser = null; renderPage(); };
        window.scrollToLectures = () => document.getElementById('lectures-section')?.scrollIntoView({ behavior: 'smooth' });
        window.toggleTheme = toggleTheme;
        window.watchFreeLecture = watchFreeLecture;
        window.checkAuthAndWatch = checkAuthAndWatch;
        window.checkAuthForFullCourse = checkAuthForFullCourse;
        window.showProfile = showProfile;
        window.showLoginScreen = showLoginScreen;
        window.showRegisterScreen = showRegisterScreen;
        window.renderPage = renderPage;

        // Start App
        renderPage();
    </script>
</body>
</html>
