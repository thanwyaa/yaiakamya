<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة يلا كيمياء | مستر زياد مبروك</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* تحميل خط Readex Pro الفخم */
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Readex Pro', sans-serif; 
            margin: 0; 
            background-color: #ffffff; 
            color: #1a1a1a;
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, #fff5f5 0%, #ffffff 100%);
        }

        .red-btn {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            box-shadow: 0 10px 20px -5px rgba(225, 29, 72, 0.4);
        }

        .teacher-img-box {
            position: relative;
            z-index: 1;
        }

        .teacher-img-box::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 2px solid #e11d48;
            border-radius: 40px;
            z-index: -1;
            transform: rotate(3deg);
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(225, 29, 72, 0.05);
        }

        /* أنيميشن بسيط لظهور المحتوى */
        .fade-up {
            animation: fadeUp 0.8s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const teacherImg = "https://i.ibb.co/9j74J07/42938.png";

            // بيانات المحاضرات (كاملة كما طلبت)
            const lectures = [
                { title: "المحاضرة الأولى: أنواع الروابط", url: "https://youtu.be/3SQy6j9qdX0" },
                { title: "الدرس الثاني: نظرية الثمانيات", url: "https://youtu.be/KIdHLm_BtRt" },
                { title: "الدرس الثاني: التهجين", url: "https://youtu.be/1JIVypRTUxI" },
                { title: "الدرس الثالث: نظرية VSEPR", url: "https://youtu.be/u7rTOP0lpak" }
            ];

            const navLinks = [
                { id: 'home', label: 'الرئيسية' },
                { id: 'lectures', label: 'المحاضرات' },
                { id: 'solutions', label: 'حل الكتب' },
                { id: 'camp', label: 'المعسكر' },
                { id: 'contact', label: 'تواصل معنا' }
            ];

            return (
                <div className="min-h-screen">
                    {/* --- Navbar --- */}
                    <nav className="fixed top-0 w-full z-50 nav-glass h-20 px-6 lg:px-20 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-xl overflow-hidden border-2 border-rose-600 shadow-sm">
                                <img src={teacherImg} className="w-full h-full object-cover" />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-rose-600 leading-none">يلا كيمياء</h1>
                                <span className="text-[10px] text-gray-400 font-medium tracking-widest uppercase">Mr Ziad Mabrouk</span>
                            </div>
                        </div>

                        <div className="hidden md:flex gap-8">
                            {navLinks.map(link => (
                                <button 
                                    key={link.id} 
                                    onClick={() => setCurrentPage(link.id)}
                                    className={`text-sm font-semibold transition-all ${currentPage === link.id ? 'text-rose-600' : 'text-gray-500 hover:text-rose-600'}`}
                                >
                                    {link.label}
                                </button>
                            ))}
                        </div>

                        <button className="md:hidden text-rose-600">
                           <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                        </button>
                    </nav>

                    {/* --- Content --- */}
                    <main className="pt-20">
                        {currentPage === 'home' ? (
                            <div className="fade-up">
                                {/* Hero Section */}
                                <section className="hero-gradient py-16 lg:py-28 px-6 lg:px-20 grid lg:grid-cols-2 gap-12 items-center">
                                    <div className="space-y-8 text-center lg:text-right">
                                        <div className="inline-flex items-center gap-2 bg-rose-50 text-rose-600 px-4 py-1.5 rounded-full text-xs font-bold border border-rose-100">
                                            ✨ المنصة الرسمية لطلاب تانية ثانوي
                                        </div>
                                        <h1 className="text-5xl lg:text-7xl font-bold text-gray-900 leading-[1.15]">
                                            فهم الكيمياء <br/>
                                            <span className="text-rose-600">بأسلوب العمالقة</span>
                                        </h1>
                                        <p className="text-lg text-gray-500 font-medium max-w-xl mx-auto lg:mx-0 leading-relaxed">
                                            مع مستر زياد مبروك، بنبسط لك المعلومة وبنحل معاك كل الكتب الخارجية عشان تضمن الدرجة النهائية وأنت مطمن.
                                        </p>
                                        <div className="flex flex-wrap gap-4 justify-center lg:justify-start pt-4">
                                            <button onClick={() => setCurrentPage('lectures')} className="red-btn text-white px-10 py-4 rounded-2xl font-bold text-lg hover:scale-105 transition-all">ابدأ الآن مجاناً</button>
                                            <button className="bg-white border-2 border-gray-100 text-gray-700 px-10 py-4 rounded-2xl font-bold text-lg hover:bg-gray-50 transition-all">خطة المنهج</button>
                                        </div>
                                    </div>

                                    <div className="flex justify-center relative">
                                        <div className="teacher-img-box w-72 h-72 lg:w-[450px] lg:h-[450px] bg-rose-600 rounded-[40px] overflow-hidden shadow-2xl">
                                            <img src={teacherImg} className="w-full h-full object-cover scale-110 mt-6" alt="Mr Ziad" />
                                        </div>
                                    </div>
                                </section>

                                {/* Features */}
                                <section className="py-20 px-6 lg:px-20 grid md:grid-cols-3 gap-8">
                                    {[
                                        { t: "شرح احترافي", d: "تبسيط أعقد دروس الكيمياء" },
                                        { t: "حل الكتب", d: "حل كتاب الوافي والامتحان" },
                                        { t: "متابعة تليجرام", d: "رد فوري على كل أسئلتك" }
                                    ].map((f, i) => (
                                        <div key={i} className="p-10 bg-white border border-gray-100 rounded-[35px] hover:shadow-xl hover:shadow-rose-500/5 transition-all text-center">
                                            <h3 className="text-xl font-bold text-gray-900 mb-2">{f.t}</h3>
                                            <p className="text-gray-400 text-sm font-medium">{f.d}</p>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        ) : (
                            <div className="p-20 text-center fade-up">
                                <h2 className="text-3xl font-bold text-rose-600 mb-4">جاري تحديث القسم..</h2>
                                <p className="text-gray-500 font-medium">كل محاضرات وحلول مستر زياد مبروك هتكون متاحة هنا خلال لحظات.</p>
                                <button onClick={() => setCurrentPage('home')} className="mt-8 text-rose-600 font-bold underline">العودة للرئيسية</button>
                            </div>
                        )}
                    </main>

                    {/* Footer بسيط */}
                    <footer className="py-10 border-t border-gray-50 text-center">
                        <p className="text-gray-400 text-sm font-medium">جميع الحقوق محفوظة لمنصة يلا كيمياء © 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
