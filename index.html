<body>
    <div id="root" class="min-h-screen">
        <!-- Loading Screen -->

    <!-- Main Application -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Firebase Configuration (استبدل ببيانات Firebase الحقيقية)
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKeyExample123456",
            authDomain: "yalla-kimya.firebaseapp.com",
            projectId: "yalla-kimya",
            storageBucket: "yalla-kimya.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Auth Context
        const AuthContext = React.createContext();
        
        function AuthProvider({ children }) {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
                    if (firebaseUser) {
                        const userDoc = await db.collection('users').doc(firebaseUser.uid).get();
                        const userData = userDoc.data();
                        setUser({
                            uid: firebaseUser.uid,
                            email: firebaseUser.email,
                            name: userData?.name || firebaseUser.displayName,
                            coins: userData?.coins || 100,
                            role: userData?.role || 'student'
                        });
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return unsubscribe;
            }, []);
            
            const loginWithGoogle = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const userRef = db.collection('users').doc(result.user.uid);
                const userSnap = await userRef.get();
                
                if (!userSnap.exists) {
                    await userRef.set({
                        uid: result.user.uid,
                        name: result.user.displayName,
                        email: result.user.email,
                        coins: 100,
                        role: 'student',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                return result;
            };
            
            const loginWithEmail = async (email, password) => {
                return await auth.signInWithEmailAndPassword(email, password);
            };
            
            const register = async (email, password, name) => {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(result.user.uid).set({
                    uid: result.user.uid,
                    name: name,
                    email: email,
                    coins: 100,
                    role: 'student',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                return result;
            };
            
            const logout = async () => {
                await auth.signOut();
                setUser(null);
            };
            
            return (
                <AuthContext.Provider value={{ user, loading, loginWithGoogle, loginWithEmail, register, logout }}>
                    {children}
                </AuthContext.Provider>
            );
        }
        
        function useAuth() {
            return useContext(AuthContext);
        }
        
        // Navbar Component
        function Navbar() {
            const { user, logout } = useAuth();
            const [theme, setTheme] = useState('dark');
            
            const toggleTheme = () => {
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                document.documentElement.classList.toggle('dark', newTheme === 'dark');
                localStorage.setItem('theme', newTheme);
            };
            
            useEffect(() => {
                const savedTheme = localStorage.getItem('theme') || 'dark';
                setTheme(savedTheme);
                document.documentElement.classList.toggle('dark', savedTheme === 'dark');
            }, []);
            
            return (
                <nav className={`fixed w-full z-50 ${
                    theme === 'dark' 
                        ? 'bg-gray-900/80 backdrop-blur-lg border-gray-700' 
                        : 'bg-white/80 backdrop-blur-lg border-gray-200'
                } border-b`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">🧪</span>
                                <span className="text-xl font-bold bg-gradient-to-r from-cyan-500 to-purple-500 bg-clip-text text-transparent">
                                    Yalla Kimya
                                </span>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <button onClick={toggleTheme} className="text-2xl">
                                    {theme === 'dark' ? '☀️' : '🌙'}
                                </button>
                                
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center gap-1 px-3 py-1 rounded-full bg-yellow-500/20">
                                            <span>🪙</span>
                                            <span className="font-bold text-yellow-500">{user.coins}</span>
                                        </div>
                                        <button onClick={logout} className="px-4 py-2 bg-red-500 text-white rounded-lg text-sm">
                                            خروج
                                        </button>
                                    </div>
                                ) : (
                                    <a href="/login">
                                        <button className="px-4 py-2 bg-cyan-500 text-white rounded-lg text-sm">
                                            دخول
                                        </button>
                                    </a>
                                )}
                            </div>
                        </div>
                    </div>
                </nav>
            );
        }
        
        // Hero Section
        function HeroSection() {

            return (

                    <div className="relative z-10 text-center px-4 max-w-6xl mx-auto">
                        <div className="animate-slide-in">
                            <div className="text-8xl mb-6 animate-bounce">🧪</div>
                            
                            <h1 className="text-5xl md:text-7xl lg:text-8xl font-bold mb-6 bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400 bg-clip-text text-transparent animate-gradient">
                                Yalla Kimya
                            </h1>
                            
                            <p className="text-2xl md:text-3xl text-white mb-4">
                                مع <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-400">مستر زياد مبروك</span>
                            </p>
                            
                            <p className="text-lg md:text-xl text-gray-200 mb-12 max-w-3xl mx-auto">
                                👨‍🔬 أسهل وأسرع طريقة لفهم الكيمياء - مع نظام متكامل من المحاضرات والكويزات والتحديات اليومية
                            </p>
                            
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <a href={user ? "/lectures" : "/register"}>
                                    <button className="px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-500 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-cyan-500/50 transition-all transform hover:scale-105">

                                {!user && (

                                            🔐 تسجيل الدخول
                                        </button>
                                    </a>
                                )}
                            </div>
                            
                            <div className="mt-16 grid grid-cols-2 md:grid-cols-4 gap-6 max-w-3xl mx-auto">
                                <div className="text-center">
                                    <div className="text-3xl font-bold text-white animate-pulse-slow">5000+</div>
                                    <div className="text-sm text-gray-300">طالب</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-3xl font-bold text-white animate-pulse-slow">50+</div>
                                    <div className="text-sm text-gray-300">محاضرة</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-3xl font-bold text-white animate-pulse-slow">1000+</div>
                                    <div className="text-sm text-gray-300">سؤال</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-3xl font-bold text-white animate-pulse-slow">4.9</div>
                                    <div className="text-sm text-gray-300">تقييم</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Features Section
        function FeaturesSection() {
            const features = [
                { icon: '📚', title: 'محاضرات منظمة', desc: 'محاضرات مرتبة حسب الباب والموضوع مع فيديوهات شرح عالية الجودة' },
                { icon: '📝', title: 'كويزات تفاعلية', desc: 'اختبر فهمك بعد كل محاضرة واحصل على عملات كيميائية' },
                { icon: '🪙', title: 'نظام العملات', desc: 'اربح عملات كيميائية مع كل إنجاز وتمريرة ناجحة' },
                { icon: '📊', title: 'متابعة حقيقية', desc: 'تتبع تقدمك بشكل لحظي وشوف نقاط قوتك وضعفك' },
                { icon: '🏆', title: 'منافسات يومية', desc: 'تنافس مع زملائك على لوحة المتصدرين وجوائز أسبوعية' },
                { icon: '🎯', title: 'تدريبات مكثفة', desc: 'أكثر من 150 سؤال للامتحان مع حلول نموذجية' }
            ];
            
            return (
                <div className="py-20 px-4 bg-gray-50 dark:bg-gray-900">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-12">
                            <h2 className="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-cyan-500 to-purple-500 bg-clip-text text-transparent">
                                🌟 ليه تختار Yalla Kimya؟
                            </h2>
                            <p className="text-gray-600 dark:text-gray-400 text-lg max-w-2xl mx-auto">
                                منصة متكاملة لكل احتياجاتك الدراسية مع نظام تعليمي حديث
                            </p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {features.map((feature, index) => (
                                <div key={index} className="group bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg hover:shadow-2xl transition-all duration-300 border border-gray-200 dark:border-gray-700 hover:border-cyan-500">
                                    <div className="text-5xl mb-4 group-hover:scale-110 transition-transform duration-300">
                                        {feature.icon}
                                    </div>
                                    <h3 className="text-xl font-bold text-gray-800 dark:text-white mb-2">{feature.title}</h3>
                                    <p className="text-gray-600 dark:text-gray-400">{feature.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        
        // Live Stats Section
        function LiveStatsSection() {
            const [stats, setStats] = useState({ students: 0, lectures: 0, hours: 0 });
            
            useEffect(() => {
                const fetchStats = async () => {
                    const usersSnap = await db.collection('users').where('role', '==', 'student').get();
                    const lecturesSnap = await db.collection('lectures').get();
                    setStats({
                        students: usersSnap.size,
                        lectures: lecturesSnap.size,
                        hours: usersSnap.size * 12
                    });
                };
                fetchStats();
                
                // Real-time listener
                const unsubscribe = db.collection('users').where('role', '==', 'student')
                    .onSnapshot((snapshot) => {
                        setStats(prev => ({ ...prev, students: snapshot.size }));
                    });
                
                return () => unsubscribe();
            }, []);
            
            return (
                <div className="py-16 bg-gradient-to-r from-cyan-500 to-blue-500">
                    <div className="max-w-7xl mx-auto px-4">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="text-center">
                                <div className="text-5xl font-bold text-white mb-2 animate-pulse">{stats.students}+</div>
                                <div className="text-white/90 text-lg">👨‍🎓 طالب مسجل</div>
                            </div>
                            <div className="text-center">
                                <div className="text-5xl font-bold text-white mb-2 animate-pulse">{stats.lectures}+</div>
                                <div className="text-white/90 text-lg">📚 محاضرة</div>
                            </div>
                            <div className="text-center">
                                <div className="text-5xl font-bold text-white mb-2 animate-pulse">{stats.hours}+</div>
                                <div className="text-white/90 text-lg">⏱️ ساعة مذاكرة</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Instructor Section
        function InstructorSection() {

                <div className="py-20 px-4 bg-gradient-to-br from-purple-600 to-blue-600">

                        <div className="flex flex-col md:flex-row items-center gap-12">
                            <div className="flex-1 text-center">
                                <div className="relative inline-block">
                                    <div className="w-48 h-48 md:w-64 md:h-64 rounded-full bg-gradient-to-r from-yellow-400 to-orange-400 p-1">

                                            👨‍🔬
                                        </div>
                                    </div>
                                    <div className="absolute -bottom-2 -right-2 text-5xl animate-bounce">⭐</div>
                                </div>
                            </div>
                            
                            <div className="flex-1 text-center md:text-right">
                                <h2 className="text-4xl font-bold text-white mb-4">
                                    مستر <span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-400">زياد مبروك</span>
                                </h2>
                                
                                <div className="flex justify-center md:justify-start gap-2 mb-6">
                                    <span className="px-3 py-1 bg-white/20 rounded-full text-white text-sm">🏆 10+ سنوات خبرة</span>
                                    <span className="px-3 py-1 bg-white/20 rounded-full text-white text-sm">📚 5000+ طالب</span>
                                    <span className="px-3 py-1 bg-white/20 rounded-full text-white text-sm">⭐ 4.9 تقييم</span>
                                </div>
                                
                                <p className="text-white/90 text-lg leading-relaxed mb-6">
                                    مستر زياد مبروك، خبير في تدريس الكيمياء بأسلوب مبسط ومبتكر. 
                                    ساعد آلاف الطلاب على تحقيق أعلى الدرجات وتجاوز صعوبات المادة. 
                                    يتميز بقدرته على توصيل المعلومات المعقدة بأسهل الطرق مع أمثلة واقعية 
                                    وتطبيقات عملية.
                                </p>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/10 backdrop-blur rounded-xl p-4 text-center">
                                        <div className="text-2xl mb-1">🎯</div>
                                        <div className="text-white font-bold">95%</div>
                                        <div className="text-white/80 text-sm">نسبة النجاح</div>
                                    </div>
                                    <div className="bg-white/10 backdrop-blur rounded-xl p-4 text-center">
                                        <div className="text-2xl mb-1">⏱️</div>
                                        <div className="text-white font-bold">15K+</div>
                                        <div className="text-white/80 text-sm">ساعة تدريس</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // Main App Component
        function App() {
            return (
                <AuthProvider>
                    <Navbar />
                    <HeroSection />
                    <FeaturesSection />
                    <LiveStatsSection />
                    <InstructorSection />
                </AuthProvider>
            );
        }
        
        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
