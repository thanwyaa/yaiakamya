<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yalla Kimya | مع مستر زياد مبروك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            width: 50px;
            height: 50px;
            animation: spin 1s infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .glass {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient 3s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-blue-900 to-cyan-900 min-h-screen">
    <div id="app" class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-white text-lg">🧪 Yalla Kimya | جاري التحميل...</p>
        </div>
    </div>

    <script>
        // Firebase Configuration - البيانات الحقيقية من مشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyBOBu3wp3GcA-VjwtqIt1PAYYpo_HXFhtU",
            authDomain: "yalla-kimya.firebaseapp.com",
            projectId: "yalla-kimya",
            storageBucket: "yalla-kimya.firebasestorage.app",
            messagingSenderId: "1052374689829",
            appId: "1:1052374689829:web:fbb815ab42d753e63377cc",
            measurementId: "G-B3SJFF8R1R"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Enable Firestore offline persistence
        db.enablePersistence().catch(err => {
            console.log('Persistence error:', err);
        });

        function showError(msg, details = '') {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="text-center p-8 max-w-md mx-auto">
                    <div class="text-6xl mb-4">⚠️</div>
                    <h2 class="text-2xl font-bold text-white mb-4">خطأ في الاتصال</h2>
                    <p class="text-red-300 mb-4">${msg}</p>
                    ${details ? `<p class="text-white/50 text-sm mb-4">${details}</p>` : ''}
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-cyan-500 rounded-lg text-white font-semibold">
                        إعادة المحاولة
                    </button>
                </div>
            `;
        }

        async function initApp() {
            try {
                // Test Firestore connection
                await db.collection('test').doc('connection').set({ time: new Date() }, { merge: true });
                console.log('✅ Firebase connected successfully!');
            } catch (error) {
                console.error('Firebase connection error:', error);
                showError('فشل الاتصال بقواعد البيانات', 'تأكد من تفعيل Firestore Database في وضع test mode');
                return;
            }
            
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    try {
                        const userDoc = await db.collection('users').doc(user.uid).get();
                        const userData = userDoc.data();
                        showMainApp(user, userData || { coins: 0, name: user.displayName });
                    } catch (error) {
                        console.error('Error fetching user:', error);
                        showMainApp(user, { coins: 0, name: user.displayName });
                    }
                } else {
                    showLoginScreen();
                }
            });
        }

        function showLoginScreen() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass rounded-2xl p-8 max-w-md w-full shadow-2xl">
                        <div class="text-center">
                            <div class="text-7xl mb-4 animate-bounce">🧪</div>
                            <h1 class="text-4xl font-bold gradient-text mb-2">Yalla Kimya</h1>
                            <p class="text-white/80 mb-6 text-lg">مع <span class="text-yellow-400 font-bold">مستر زياد مبروك</span></p>
                        </div>
                        
                        <div class="space-y-4">
                            <button onclick="loginWithGoogle()" class="w-full py-3 bg-white/20 rounded-xl text-white font-semibold hover:bg-white/30 transition-all flex items-center justify-center gap-2">
                                <span>🍕</span> تسجيل الدخول بجوجل
                            </button>
                            
                            <div class="relative my-4">
                                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/20"></div></div>
                                <div class="relative flex justify-center"><span class="px-2 bg-transparent text-white/50 text-sm">أو</span></div>
                            </div>
                            
                            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500 transition">
                            <input type="password" id="password" placeholder="كلمة المرور" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500 transition">
                            <button onclick="loginWithEmail()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-semibold hover:shadow-lg transition">
                                دخول
                            </button>
                            
                            <p class="text-center text-white/50 text-sm mt-4">
                                ليس لديك حساب؟ <a href="#" onclick="showRegister()" class="text-cyan-400 hover:underline">إنشاء حساب جديد</a>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function showRegister() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass rounded-2xl p-8 max-w-md w-full shadow-2xl">
                        <div class="text-center">
                            <div class="text-7xl mb-4">📝</div>
                            <h1 class="text-3xl font-bold gradient-text mb-2">إنشاء حساب</h1>
                            <p class="text-white/70 mb-6">انضم إلى عائلة Yalla Kimya</p>
                        </div>
                        
                        <div class="space-y-4">
                            <input type="text" id="regName" placeholder="الاسم الكامل" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <input type="password" id="regPassword" placeholder="كلمة المرور (6 أحرف على الأقل)" class="w-full px-4 py-3 bg-white/10 rounded-xl text-white placeholder-white/50 border border-white/20 focus:outline-none focus:border-cyan-500">
                            <button onclick="registerWithEmail()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl text-white font-semibold hover:shadow-lg transition">
                                إنشاء حساب
                            </button>
                            
                            <p class="text-center text-white/50 text-sm mt-4">
                                لديك حساب؟ <a href="#" onclick="showLoginScreen()" class="text-cyan-400 hover:underline">تسجيل الدخول</a>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function showMainApp(user, userData) {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen">
                    <!-- Navbar -->
                    <nav class="fixed top-0 w-full bg-black/50 backdrop-blur-lg border-b border-white/10 z-50">
                        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="text-2xl">🧪</span>
                                <span class="text-xl font-bold gradient-text">Yalla Kimya</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="flex items-center gap-1 px-3 py-1 bg-yellow-500/20 rounded-full">
                                    <span>🪙</span>
                                    <span class="text-yellow-400 font-bold">${userData?.coins || 0}</span>
                                </div>
                                <button onclick="logout()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg text-sm hover:bg-red-500/30 transition">
                                    خروج
                                </button>
                            </div>
                        </div>
                    </nav>
                    
                    <!-- Hero Section -->
                    <div class="pt-20 min-h-screen flex items-center justify-center text-center px-4">
                        <div class="max-w-4xl mx-auto">
                            <div class="text-8xl mb-6 animate-bounce">🧪</div>
                            <h1 class="text-5xl md:text-7xl font-bold gradient-text mb-4">
                                Yalla Kimya
                            </h1>
                            <p class="text-2xl md:text-3xl text-white mb-3">
                                مع <span class="text-yellow-400 font-bold">مستر زياد مبروك</span>
                            </p>
                            <p class="text-lg text-white/70 mb-8 max-w-2xl mx-auto">
                                👨‍🔬 أسهل وأسرع طريقة لفهم الكيمياء - مع نظام متكامل من المحاضرات والكويزات والتحديات اليومية
                            </p>
                            
                            <button onclick="showLectures()" class="px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-xl font-bold text-lg hover:shadow-lg transition transform hover:scale-105">
                                🚀 ابدأ التعلم الآن
                            </button>
                            
                            <!-- Stats -->
                            <div class="mt-16 grid grid-cols-2 md:grid-cols-4 gap-6 max-w-3xl mx-auto">
                                <div class="glass rounded-xl p-4">
                                    <div class="text-2xl font-bold text-white" id="statStudents">5000+</div>
                                    <div class="text-white/50 text-sm">طالب</div>
                                </div>
                                <div class="glass rounded-xl p-4">
                                    <div class="text-2xl font-bold text-white" id="statLectures">50+</div>
                                    <div class="text-white/50 text-sm">محاضرة</div>
                                </div>
                                <div class="glass rounded-xl p-4">
                                    <div class="text-2xl font-bold text-white" id="statQuestions">1000+</div>
                                    <div class="text-white/50 text-sm">سؤال</div>
                                </div>
                                <div class="glass rounded-xl p-4">
                                    <div class="text-2xl font-bold text-white" id="statRating">4.9</div>
                                    <div class="text-white/50 text-sm">تقييم</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Load stats from Firebase
            loadStats();
        }

        async function loadStats() {
            try {
                const usersSnap = await db.collection('users').where('role', '==', 'student').get();
                const lecturesSnap = await db.collection('lectures').get();
                
                const statsDiv = document.getElementById('statStudents');
                if (statsDiv) statsDiv.innerText = usersSnap.size + '+';
                
                const lecturesDiv = document.getElementById('statLectures');
                if (lecturesDiv) lecturesDiv.innerText = lecturesSnap.size + '+';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function showLectures() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen pt-20 p-4">
                    <div class="max-w-7xl mx-auto">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl md:text-4xl font-bold gradient-text mb-2">📚 المحاضرات</h1>
                            <p class="text-white/70">اختر المحاضرة المناسبة وابدأ التعلم</p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="lecturesList">
                            <div class="text-center text-white/50 py-12">جاري تحميل المحاضرات...</div>
                        </div>
                        
                        <div class="text-center mt-8">
                            <button onclick="goBack()" class="px-6 py-2 glass rounded-lg text-white hover:bg-white/20 transition">
                                ← العودة للرئيسية
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            loadLectures();
        }

        async function loadLectures() {
            const lecturesDiv = document.getElementById('lecturesList');
            if (!lecturesDiv) return;
            
            try {
                const lecturesSnap = await db.collection('lectures').orderBy('createdAt', 'desc').get();
                
                if (lecturesSnap.empty) {
                    lecturesDiv.innerHTML = `
                        <div class="col-span-3 text-center text-white/50 py-12">
                            لا توجد محاضرات حالياً. سيتم إضافتها قريباً!
                        </div>
                    `;
                    return;
                }
                
                lecturesDiv.innerHTML = lecturesSnap.docs.map(doc => {
                    const lecture = doc.data();
                    return `
                        <div class="glass rounded-2xl overflow-hidden hover:shadow-2xl transition">
                            <div class="relative pb-[56.25%]">
                                <img src="https://img.youtube.com/vi/${lecture.videoId}/0.jpg" class="absolute inset-0 w-full h-full object-cover">
                            </div>
                            <div class="p-4">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="px-2 py-1 bg-cyan-500/20 text-cyan-400 rounded-full text-xs">${lecture.chapter || 'عام'}</span>
                                    <span class="text-white/50 text-xs">👁️ ${lecture.views || 0}</span>
                                </div>
                                <h3 class="text-white font-bold mb-3">${lecture.title}</h3>
                                <button onclick="watchLecture('${lecture.videoId}', '${doc.id}')" class="w-full py-2 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-lg text-white font-semibold text-sm">
                                    مشاهدة المحاضرة
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading lectures:', error);
                lecturesDiv.innerHTML = `
                    <div class="col-span-3 text-center text-red-400 py-12">
                        فشل في تحميل المحاضرات
                    </div>
                `;
            }
        }

        function watchLecture(videoId, lectureId) {
            // Increment views
            db.collection('lectures').doc(lectureId).update({
                views: firebase.firestore.FieldValue.increment(1)
            }).catch(console.error);
            
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="min-h-screen pt-16 p-4">
                    <div class="max-w-5xl mx-auto">
                        <button onclick="showLectures()" class="mb-4 px-4 py-2 glass rounded-lg text-white hover:bg-white/20 transition">
                            ← العودة للمحاضرات
                        </button>
                        <div class="glass rounded-2xl overflow-hidden">
                            <div class="relative pb-[56.25%]">
                                <iframe class="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function goBack() {
            const user = auth.currentUser;
            if (user) {
                db.collection('users').doc(user.uid).get().then(doc => {
                    showMainApp(user, doc.data());
                });
            } else {
                showLoginScreen();
            }
        }

        // Auth Functions
        window.loginWithGoogle = async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const userRef = db.collection('users').doc(result.user.uid);
                const userSnap = await userRef.get();
                
                if (!userSnap.exists) {
                    await userRef.set({
                        name: result.user.displayName,
                        email: result.user.email,
                        coins: 100,
                        role: 'student',
                        createdAt: new Date(),
                        quizzesCompleted: 0
                    });
                }
                alert('✅ تم تسجيل الدخول بنجاح!');
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        };

        window.loginWithEmail = async () => {
            const email = document.getElementById('email')?.value;
            const password = document.getElementById('password')?.value;
            if (!email || !password) {
                alert('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                alert('✅ تم تسجيل الدخول بنجاح!');
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        };

        window.registerWithEmail = async () => {
            const name = document.getElementById('regName')?.value;
            const email = document.getElementById('regEmail')?.value;
            const password = document.getElementById('regPassword')?.value;
            if (!name || !email || !password) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }
            if (password.length < 6) {
                alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(result.user.uid).set({
                    name: name,
                    email: email,
                    coins: 100,
                    role: 'student',
                    createdAt: new Date(),
                    quizzesCompleted: 0
                });
                alert('✅ تم إنشاء الحساب بنجاح!');
            } catch (error) {
                alert('❌ خطأ: ' + error.message);
            }
        };

        window.logout = async () => {
            await auth.signOut();
            showLoginScreen();
        };

        window.showRegister = showRegister;
        window.showLoginScreen = showLoginScreen;
        window.showLectures = showLectures;
        window.watchLecture = watchLecture;
        window.goBack = goBack;

        // Start the app
        initApp();
    </script>
</body>
</html>
